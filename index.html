<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Haya ❤️</title>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            overflow: hidden; /* Prevents scrolling when button jumps */
            touch-action: manipulation;
        }

        h1 {
            font-size: clamp(35px, 10vw, 55px);
            color: #ff4d6d;
            margin: 0 0 10px 0;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
        }

        .highlight-date {
            color: #ffd6e0;
            font-size: 1rem;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        #counter {
            font-size: 1.2rem;
            color: #ffb3c1;
            margin-bottom: 30px;
            font-variant-numeric: tabular-nums;
        }

        .btn-main {
            padding: 18px 40px;
            font-size: 20px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            z-index: 100;
        }

        #message-container {
            width: 90%;
            max-width: 500px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #message {
            font-size: 19px;
            line-height: 1.5;
            color: #ffd6e0;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        #question-area {
            margin-top: 30px;
            opacity: 0;
            transition: opacity 1.5s ease;
            display: none;
        }

        .question-text {
            font-size: 22px;
            font-weight: bold;
            color: #ff4d6d;
            margin-bottom: 25px;
            display: block;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 60px;
        }

        .yes-btn {
            background: #4caf50;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .no-btn {
            background: #f44336;
            padding: 12px 30px;
            border-radius: 50px;
            color: white;
            border: none;
            font-size: 16px;
            position: absolute;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
        }

        /* Star & Heart Animations */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: var(--opacity); } }
        .heart { position: absolute; pointer-events: none; animation: floatUp var(--speed) linear forwards; z-index: 50; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-110vh) scale(1.5); opacity: 0; } }
    </style>
</head>

<body>

    <div id="main-content">
        <h1>For Haya ❤️</h1>
        <p class="highlight-date">Since December 15, 2025</p>
        <div id="counter">Calculating...</div>
        <button id="startBtn" class="btn-main" onclick="showLove()">Click here, Haya</button>
    </div>

    <div id="message-container">
        <p id="message"></p>
        <div id="question-area">
            <span class="question-text">💍 Will you stay with me forever?</span>
            <div class="button-group">
                <button class="yes-btn" onclick="sayYes()">Yes!</button>
                <button id="noBtn" class="no-btn">No</button>
            </div>
        </div>
    </div>

    <script>
        // --- COUNTER ---
        const start = new Date("December 15, 2025 00:00:00").getTime();
        function updateCounter() {
            const now = new Date().getTime();
            const diff = now - start;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("counter").innerHTML = `${days}d : ${hours}h : ${minutes}m : ${seconds}s`;
        }
        setInterval(updateCounter, 1000);
        updateCounter();

        // --- NAVIGATION ---
        function showLove() {
            document.getElementById("main-content").style.display = 'none';
            const msg = document.getElementById("message");
            const qArea = document.getElementById("question-area");
            msg.style.opacity = 1;
            msg.innerHTML = "With each passing day, my love for you grows stronger, and with each call, I love your voice even more. I feel like you've become a part of me, an essential part of my personality, something I don't want to lose. I'm so lucky to be able to call you mine.";

            setTimeout(() => {
                qArea.style.display = 'block';
                setTimeout(() => { qArea.style.opacity = 1; }, 50);
            }, 3000);
            createHearts(25);
        }

        // --- THE RUNAWAY LOGIC (IPHONE FRIENDLY) ---
        const noBtn = document.getElementById("noBtn");

        function moveNo() {
            // Calculate random positions that stay within the screen padding
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;
            
            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
        }

        // Trigger move on hover (PC) AND touch (iPhone)
        noBtn.addEventListener("mouseover", moveNo);
        noBtn.addEventListener("touchstart", (e) => {
            e.preventDefault(); // Prevents clicking
            moveNo();
        });

        function sayYes() {
            document.getElementById("message-container").innerHTML = "<h2 style='color:#ff4d6d; font-size: 32px; animation: pulse 1s infinite;'>Yay! I knew it! <br> I love you forever Haya! ❤️</h2>";
            createHearts(100);
        }

        // --- EFFECTS ---
        function createHearts(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const heart = document.createElement("div");
                    heart.className = "heart";
                    heart.innerHTML = "❤️";
                    heart.style.left = Math.random() * 95 + "vw";
                    heart.style.top = "100vh";
                    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
                    heart.style.setProperty('--speed', (Math.random() * 2 + 3) + "s");
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 5000);
                }, i * 80);
            }
        }

        // Background Stars
        for (let i = 0; i < 100; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 2 + "px";
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + "s");
            star.style.setProperty('--opacity', Math.random());
            document.body.appendChild(star);
        }
    </script>
</body>
</html>
