<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya's Mission ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #0a0014; font-family: sans-serif; height: 100vh; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* Smooth World Movement */
        #world { 
            position: absolute; width: 5000px; height: 100%; 
            background: linear-gradient(to bottom, #1a0033 0%, #33001a 100%);
            will-change: transform;
        }

        /* Characters */
        .char { position: absolute; width: 45px; height: 60px; z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
        .haya-body { width: 38px; height: 48px; background: #fff; border-radius: 12px 12px 2px 2px; position: absolute; bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .stethoscope { position: absolute; width: 22px; height: 20px; border: 2.5px solid #333; border-radius: 50%; top: 4px; left: 8px; border-top-color: transparent; }
        .cross { color: #ff4d6d; font-size: 14px; position: absolute; top: 20px; left: 13px; font-weight: 900; }
        
        /* Mohammed - Refined Design */
        .mo-body { width: 42px; height: 54px; background: #1a1a1a; border-radius: 10px 10px 2px 2px; position: absolute; bottom: 8px; border-top: 18px solid #3d2b1f; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .mo-shirt { position: absolute; width: 14px; height: 22px; background: #2c3e50; top: 18px; left: 14px; border-radius: 2px; border-top: 4px solid #fff; }
        .mo-face { width: 100%; text-align: center; color: white; position: absolute; top: 18px; font-size: 11px; font-weight: bold; }

        .foot { width: 14px; height: 10px; background: #111; border-radius: 3px; position: absolute; bottom: 0; }
        .foot-l { left: 6px; } .foot-r { right: 6px; }

        /* Obstacles & Platforms */
        .spike { position: absolute; width: 35px; height: 25px; background: #555; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); z-index: 5; }
        .platform { position: absolute; background: #ff758c; border-radius: 6px; border-bottom: 8px solid #a30026; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Cutscene Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: background 2.5s; }
        .love-msg { font-family: 'Caveat', cursive; font-size: 50px; color: white; opacity: 0; text-shadow: 0 0 20px #ff4d6d; text-align: center; transition: 2s; transform: translateY(20px); }
        
        /* Controls */
        #controls { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 200; }
        .btn { width: 85px; height: 85px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; border: 2px solid rgba(255,255,255,0.4); backdrop-filter: blur(10px); color: white; }
        .jump-btn { width: 130px; border-radius: 40px; background: #ff4d6d; font-size: 22px; font-weight: bold; border: none; box-shadow: 0 8px 0 #a30026; }
        .jump-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #a30026; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="world">
            <div id="player" class="char">
                <div class="haya-body"><div class="stethoscope"></div><div class="cross">✚</div></div>
                <div class="foot foot-l"></div><div class="foot foot-r"></div>
            </div>

            <div id="mohammed" class="char" style="left: 4600px; bottom: 150px;">
                <div class="mo-body"><div class="mo-shirt"></div><div class="mo-face">^ _ ^</div></div>
                <div class="foot foot-l"></div><div class="foot foot-r"></div>
            </div>
            
            <div id="platforms-layer"></div>
            <div id="spikes-layer"></div>
        </div>

        <div id="controls">
            <div style="display:flex; gap:20px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
            <div class="btn jump-btn" id="jBtn">JUMP</div>
        </div>
    </div>
    <div id="overlay"><div class="love-msg" id="msg">You Rescued My Heart ❤️</div></div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const mo = document.getElementById('mohammed');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');

        let pX = 150, pY = 400, vX = 0, vY = 0, isGrounded = false, won = false, currentCamX = 0;
        const config = { gravity: 0.85, jump: -20, speed: 8.5, charW: 45, charH: 60 };

        const platforms = [
            {x: 0, y: 100, w: 700}, {x: 850, y: 220, w: 250}, {x: 1200, y: 350, w: 200},
            {x: 1500, y: 200, w: 300}, {x: 1900, y: 400, w: 200}, {x: 2250, y: 280, w: 350},
            {x: 2750, y: 450, w: 250}, {x: 3100, y: 300, w: 300}, {x: 3550, y: 420, w: 200},
            {x: 3900, y: 250, w: 300}, {x: 4350, y: 150, w: 650}
        ];

        const spikes = [
            {x: 1550, y: 220}, {x: 2350, y: 300}, {x: 3150, y: 320}, 
            {x: 4450, y: 170}, {x: 4550, y: 170}, {x: 4650, y: 170}
        ];

        platforms.forEach(p => {
            const d = document.createElement('div'); d.className = 'platform';
            d.style.left = p.x + 'px'; d.style.bottom = p.y + 'px'; d.style.width = p.w + 'px'; d.style.height = '20px';
            document.getElementById('platforms-layer').appendChild(d);
        });

        spikes.forEach(s => {
            const d = document.createElement('div'); d.className = 'spike';
            d.style.left = s.x + 'px'; d.style.bottom = s.y + 'px';
            document.getElementById('spikes-layer').appendChild(d);
        });

        const setupBtn = (id, start, end) => {
            const b = document.getElementById(id);
            b.addEventListener('touchstart', (e) => { e.preventDefault(); if(!won) start(); });
            b.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };

        setupBtn('lBtn', () => { vX = -config.speed; player.style.transform = 'scaleX(-1)'; }, () => vX = 0);
        setupBtn('rBtn', () => { vX = config.speed; player.style.transform = 'scaleX(1)'; }, () => vX = 0);
        setupBtn('jBtn', () => { if(isGrounded) { vY = config.jump; isGrounded = false; } }, () => {});

        function startFinalScene() {
            won = true; vX = 0; vY = 0;
            document.getElementById('controls').style.opacity = '0';
            
            // Lock Camera on center of characters
            const finalCamX = -(4600 - window.innerWidth / 2 + 20);
            world.style.transition = "transform 4s cubic-bezier(0.4, 0, 0.2, 1)";
            world.style.transform = `translateX(${finalCamX}px)`;

            setTimeout(() => {
                player.style.transition = mo.style.transition = "all 6s ease-in-out";
                player.style.top = mo.style.top = "25vh"; 
                player.style.left = "4585px"; 
                mo.style.left = "4615px";
                overlay.style.background = "rgba(10, 0, 20, 0.85)";
            }, 500);

            setTimeout(() => { 
                msg.style.opacity = '1'; 
                msg.style.transform = 'translateY(0)';
            }, 3000);
            setTimeout(() => window.location.href = "index.html", 9500);
        }

        function update() {
            if(!won) {
                pX += vX; vY += config.gravity; pY += vY;
                if(pX < 0) pX = 0; if(pX > 4950) pX = 4950;
                if(pY > window.innerHeight + 100) { pX = 150; pY = 400; vY = 0; }

                isGrounded = false;
                platforms.forEach(p => {
                    let pTop = window.innerHeight - p.y - 20 - config.charH;
                    if(vY >= 0 && pX + 30 > p.x && pX < p.x + p.w - 10 && pY >= pTop - 15 && pY <= pTop + 15) {
                        pY = pTop; vY = 0; isGrounded = true;
                    }
                });

                // Spikes collision - Resets with a small buffer
                document.querySelectorAll('.spike').forEach(s => {
                    const sR = s.getBoundingClientRect(); const pR = player.getBoundingClientRect();
                    if(!(pR.right < sR.left + 5 || pR.left > sR.right - 5 || pR.bottom < sR.top || pR.top > sR.bottom)) {
                        pX = 150; pY = 400; 
                    }
                });

                // Smoother Camera Follow
                let targetCamX = -(pX - window.innerWidth / 2);
                if(targetCamX > 0) targetCamX = 0;
                if(targetCamX < -(5000 - window.innerWidth)) targetCamX = -(5000 - window.innerWidth);
                
                // Slow interpolation for camera
                currentCamX += (targetCamX - currentCamX) * 0.1;
                world.style.transform = `translateX(${currentCamX}px)`;

                player.style.left = pX + 'px'; player.style.top = pY + 'px';
                if(Math.abs(pX - 4550) < 60 && isGrounded) startFinalScene();
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
