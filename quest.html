<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya's Rescue ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: sans-serif; height: 100vh; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* Hit Effect Animation */
        .shake { animation: shake 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Parallax Backgrounds */
        .bg-layer { position: absolute; top: 0; left: 0; height: 100%; will-change: transform; }
        #stars { width: 6000px; background: radial-gradient(circle, #fff 1px, transparent 1px) 0 0 / 60px 60px; opacity: 0.2; }
        #city { width: 6000px; background: linear-gradient(to top, #1a0033 0%, transparent 40%); bottom: 0; }

        #world { position: absolute; width: 5000px; height: 100%; will-change: transform; z-index: 10; }

        /* Health Indicator */
        #ui-top-right { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 500; }
        .heart { font-size: 30px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .heart.lost { opacity: 0.2; transform: scale(0.5); }

        /* Characters */
        .char { position: absolute; width: 45px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; will-change: transform; }
        .haya-body { width: 38px; height: 48px; background: #fff; border-radius: 12px 12px 2px 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; transition: background 0.2s; }
        .invincible { opacity: 0.6; animation: flicker 0.1s infinite; }
        @keyframes flicker { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        .stethoscope { position: absolute; width: 22px; height: 20px; border: 2.5px solid #333; border-radius: 50%; top: 4px; left: 8px; border-top-color: transparent; }
        .cross { color: #ff4d6d; font-size: 14px; position: absolute; top: 20px; left: 13px; font-weight: 900; }
        
        .mo-body { width: 42px; height: 52px; background: #1a1a1a; border-radius: 10px 10px 2px 2px; border-top: 18px solid #3d2b1f; }
        .mo-shirt { position: absolute; width: 14px; height: 22px; background: #34495e; top: 0; left: 14px; border-radius: 2px; }

        .feet { display: flex; justify-content: space-between; width: 30px; margin-top: -2px; }
        .foot { width: 12px; height: 8px; background: #111; border-radius: 2px; }

        /* Platforms */
        .platform { position: absolute; background: #ff758c; border-top: 4px solid #ffafbd; border-bottom: 12px solid #a30026; border-radius: 4px; z-index: 10; }
        .spike { position: absolute; width: 36px; height: 26px; background: #7f8c8d; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); z-index: 5; }

        /* UI Controls */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 200; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; backdrop-filter: blur(5px); }
        .jump-btn { width: 120px; border-radius: 30px; background: #ff4d6d; font-weight: bold; border: none; box-shadow: 0 6px #a30026; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: 2s; }
        .love-msg { font-family: 'Caveat', cursive; font-size: 50px; color: white; opacity: 0; text-shadow: 0 0 20px #ff4d6d; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-top-right">
            <div class="heart" id="h1">❤️</div>
            <div class="heart" id="h2">❤️</div>
            <div class="heart" id="h3">❤️</div>
        </div>

        <div id="stars" class="bg-layer"></div>
        <div id="city" class="bg-layer"></div>
        
        <div id="world">
            <div id="player" class="char">
                <div id="haya-inner" class="haya-body"><div class="stethoscope"></div><div class="cross">✚</div></div>
                <div class="feet"><div class="foot"></div><div class="foot"></div></div>
            </div>

            <div id="mohammed" class="char" style="left: 4200px; bottom: 150px;">
                <div class="mo-body"><div class="mo-shirt"></div></div>
                <div class="feet"><div class="foot"></div><div class="foot"></div></div>
            </div>
            <div id="platforms-layer"></div>
            <div id="spikes-layer"></div>
        </div>

        <div id="controls">
            <div style="display:flex; gap:15px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
            <div class="btn jump-btn" id="jBtn">JUMP</div>
        </div>
    </div>
    <div id="overlay"><div class="love-msg" id="msg">You Rescued My Heart ❤️</div></div>

    <script>
        const world = document.getElementById('world');
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const hayaBody = document.getElementById('haya-inner');
        const msg = document.getElementById('msg');

        let pX = 150, pY = 400, vX = 0, vY = 0, isGrounded = false, won = false;
        let health = 3, isInvincible = false;
        let camX = 0, targetCamX = 0;
        
        const config = { gravity: 1.1, jump: -23, speed: 9, friction: 0.8 };

        const platforms = [
            {x: 0, y: 150, w: 700}, {x: 850, y: 280, w: 250}, {x: 1200, y: 380, w: 200},
            {x: 1550, y: 250, w: 300}, {x: 2000, y: 420, w: 200}, {x: 2350, y: 300, w: 350},
            {x: 2850, y: 480, w: 200}, {x: 3200, y: 350, w: 250}, {x: 3600, y: 200, w: 800}
        ];

        const spikes = [{x: 1600, y: 250}, {x: 2400, y: 300}, {x: 3800, y: 200}, {x: 3950, y: 200}];

        platforms.forEach(p => {
            const d = document.createElement('div'); d.className = 'platform';
            d.style.left = p.x + 'px'; d.style.bottom = p.y + 'px'; d.style.width = p.w + 'px'; d.style.height = '40px';
            document.getElementById('platforms-layer').appendChild(d);
        });

        spikes.forEach(s => {
            const d = document.createElement('div'); d.className = 'spike';
            d.style.left = s.x + 'px'; d.style.bottom = (s.y + 36) + 'px';
            document.getElementById('spikes-layer').appendChild(d);
        });

        const keys = { left: false, right: false };
        const setupBtn = (id, key) => {
            const b = document.getElementById(id);
            b.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            b.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        };
        setupBtn('lBtn', 'left'); setupBtn('rBtn', 'right');
        document.getElementById('jBtn').addEventListener('touchstart', (e) => {
            e.preventDefault(); if(isGrounded && !won) { vY = config.jump; isGrounded = false; }
        });

        function takeDamage() {
            if(isInvincible || won) return;
            health--;
            isInvincible = true;
            
            // Visual feedback
            document.getElementById(`h${health + 1}`).classList.add('lost');
            container.classList.add('shake');
            hayaBody.classList.add('invincible');
            hayaBody.style.background = "#ff4d6d"; // Flash red
            
            // Knockback
            vY = -10;
            vX = keys.right ? -15 : 15;

            setTimeout(() => container.classList.remove('shake'), 300);
            setTimeout(() => {
                hayaBody.style.background = "#fff";
            }, 200);

            if(health <= 0) {
                resetGame();
            } else {
                setTimeout(() => {
                    isInvincible = false;
                    hayaBody.classList.remove('invincible');
                }, 1500);
            }
        }

        function resetGame() {
            health = 3;
            pX = 150; pY = 400; vY = 0; vX = 0;
            isInvincible = false;
            hayaBody.classList.remove('invincible');
            document.querySelectorAll('.heart').forEach(h => h.classList.remove('lost'));
        }

        function update() {
            if(!won) {
                if(keys.left) vX = -config.speed;
                else if(keys.right) vX = config.speed;
                else vX *= config.friction;

                vY += config.gravity;
                pX += vX; pY -= vY;

                isGrounded = false;
                platforms.forEach(p => {
                    if (pX + 30 > p.x && pX + 10 < p.x + p.w) {
                        let platTop = p.y + 40;
                        if (vY > 0 && pY <= platTop && pY > platTop - 30) {
                            pY = platTop; vY = 0; isGrounded = true;
                        }
                    }
                });

                document.querySelectorAll('.spike').forEach(s => {
                    const sR = s.getBoundingClientRect(); const pR = player.getBoundingClientRect();
                    if(!(pR.right < sR.left + 8 || pR.left > sR.right - 8 || pR.bottom < sR.top || pR.top > sR.bottom)) {
                        takeDamage();
                    }
                });

                if(pY < -100) resetGame();
                if(pX < 0) pX = 0; if(pX > 4300) pX = 4300;

                targetCamX = -(pX - window.innerWidth / 2 + 22);
                if(targetCamX > 0) targetCamX = 0;
                if(targetCamX < -(4400 - window.innerWidth)) targetCamX = -(4400 - window.innerWidth);
                camX += (targetCamX - camX) * 0.1;

                world.style.transform = `translateX(${camX}px)`;
                document.getElementById('stars').style.transform = `translateX(${camX * 0.2}px)`;
                document.getElementById('city').style.transform = `translateX(${camX * 0.5}px)`;

                // Fixed Tilt: Leans into movement correctly
                let tilt = vX * 2;
                let flip = vX < -0.5 ? -1 : 1;
                player.style.transform = `scaleX(${flip}) rotate(${tilt * flip}deg)`;
                
                player.style.left = pX + 'px';
                player.style.bottom = pY + 'px';

                if(Math.abs(pX - 4150) < 50 && isGrounded) {
                    won = true;
                    document.getElementById('controls').style.opacity = '0';
                    setTimeout(() => {
                        player.style.transition = document.getElementById('mohammed').style.transition = "bottom 5s ease-in-out, left 5s ease-in-out";
                        player.style.bottom = document.getElementById('mohammed').style.bottom = "60vh";
                        player.style.left = "4180px"; document.getElementById('mohammed').style.left = "4215px";
                        document.getElementById('overlay').style.background = "rgba(10,0,20,0.8)";
                        setTimeout(() => msg.style.opacity = "1", 2000);
                        setTimeout(() => window.location.href = "index.html", 8000);
                    }, 500);
                }
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
