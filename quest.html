<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya: Clinical Strike</title>
    <style>
        :root { --primary: #00f2ff; --accent: #ff0055; --bg: #05020a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; height: 100vh; color: white; }

        /* --- CUTSCENE OVERLAY --- */
        #cutscene-layer {
            position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: space-between;
            transition: opacity 1s ease; pointer-events: none; opacity: 0;
        }
        #cutscene-layer.active { opacity: 1; pointer-events: all; }
        .c-bar { width: 100%; height: 12vh; background: #000; }
        #dialogue-box {
            position: absolute; bottom: 15vh; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(10, 5, 20, 0.95); border-left: 5px solid var(--primary);
            padding: 20px; font-size: 18px; letter-spacing: 1px;
        }

        /* --- GAME UI --- */
        #game-ui { position: fixed; top: 20px; left: 20px; z-index: 1000; display: none; }
        .hp-bar { width: 200px; height: 10px; border: 1px solid var(--primary); margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* --- WORLD & CHARACTER --- */
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 10000px; height: 100%; will-change: transform; }
        
        .plat { position: absolute; background: linear-gradient(180deg, #1a0b2e, #05020a); border: 2px solid #331a4d; border-radius: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .enemy { position: absolute; width: 40px; height: 40px; background: var(--accent); border-radius: 50%; filter: blur(2px); box-shadow: 0 0 15px var(--accent); }

        /* The High-Detail Model */
        .char { position: absolute; width: 60px; height: 100px; z-index: 100; transform-origin: bottom center; }
        #haya-visual { position: relative; width: 40px; height: 90px; }
        .head { position: absolute; width: 30px; height: 30px; background: #ffe0bd; border-radius: 50%; top: 0; left: 5px; z-index: 10; }
        .hair { position: absolute; width: 36px; height: 25px; background: #3d2b1f; border-radius: 15px 15px 5px 10px; top: -2px; left: -3px; }
        .eye { position: absolute; width: 5px; height: 7px; background: #111; border-radius: 50%; top: 12px; right: 5px; }
        .coat { position: absolute; width: 32px; height: 45px; background: #fff; border-radius: 5px 5px 12px 12px; top: 28px; left: 4px; border-bottom: 3px solid #f0f0f0; }
        .arm { position: absolute; width: 8px; height: 35px; background: #fff; border-radius: 4px; top: 30px; transform-origin: top center; }
        .arm-front { left: 18px; z-index: 20; }
        .syringe { position: absolute; width: 6px; height: 40px; background: var(--primary); bottom: -25px; left: 1px; box-shadow: 0 0 15px var(--primary); }
        .leg { position: absolute; width: 10px; height: 30px; background: #fff; top: 70px; border-bottom: 6px solid #111; }

        /* --- CONTROLS --- */
        #controls { position: fixed; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; z-index: 2000; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid var(--primary); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; backdrop-filter: blur(5px); }
        .btn-atk { background: var(--primary); color: #000; }

        /* Animations */
        .slash-anim { animation: slash 0.2s ease-out; }
        @keyframes slash { 0% { transform: rotate(0deg); } 50% { transform: rotate(120deg); } 100% { transform: rotate(0deg); } }
    </style>
</head>
<body>

<div id="cutscene-layer" class="active">
    <div class="c-bar"></div>
    <div id="dialogue-box">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:5px;">HAYA // UNIT 01</div>
        <div id="typewriter">Initialization complete. Bio-threats detected in Sector 4. Clearing for procedure...</div>
        <div style="font-size:12px; margin-top:10px; opacity:0.5;">[ TAP TO START MISSION ]</div>
    </div>
    <div class="c-bar"></div>
</div>

<div id="game-ui">
    VITALS: <span id="hp-val">100%</span>
    <div class="hp-bar"><div id="hp-fill"></div></div>
</div>

<div id="game-container">
    <div id="world">
        <div id="player" class="char">
            <div id="haya-visual">
                <div class="head"><div class="hair"></div><div class="eye"></div></div>
                <div class="coat"></div>
                <div class="arm arm-front" id="weapon-hand"><div class="syringe"></div></div>
                <div class="leg" style="left:5px;"></div>
                <div class="leg" style="left:20px;"></div>
            </div>
        </div>
        <div id="plats-layer"></div>
        <div id="enemies-layer"></div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:15px;"><div class="btn" id="lBtn">◀</div><div class="btn" id="rBtn">▶</div></div>
        <div style="display:flex; gap:15px;"><div class="btn btn-atk" id="aBtn">💉</div><div class="btn" id="jBtn">▲</div></div>
    </div>
</div>

<script>
    const world = document.getElementById('world'), player = document.getElementById('player');
    const cutscene = document.getElementById('cutscene-layer'), weapon = document.getElementById('weapon-hand');
    
    let pX = 150, pY = 400, vX = 0, vY = 0, hp = 100;
    let isPlaying = false, jumpCount = 0;
    const config = { gravity: 0.8, jump: -18, speed: 7, friction: 0.8 };

    // Build Level
    const platforms = [{x:0, y:150, w:800}, {x:950, y:300, w:500}, {x:1600, y:450, w:400}, {x:2100, y:250, w:800}];
    const enemies = [{x:1100, y:340}, {x:2300, y:290}];

    platforms.forEach(p => {
        const d = document.createElement('div'); d.className = 'plat';
        Object.assign(d.style, {left:p.x+'px', bottom:p.y+'px', width:p.w+'px', height:'30px'});
        document.getElementById('plats-layer').appendChild(d);
    });

    enemies.forEach((e, i) => {
        const d = document.createElement('div'); d.className = 'enemy'; d.id = 'en-'+i;
        Object.assign(d.style, {left:e.x+'px', bottom:e.y+'px'});
        document.getElementById('enemies-layer').appendChild(d);
    });

    // START GAMEPLAY
    cutscene.onclick = () => {
        cutscene.classList.remove('active');
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
        isPlaying = true;
        update();
    };

    const keys = { l: false, r: false };
    const setup = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };

    setup('lBtn', () => keys.l = true, () => keys.l = false);
    setup('rBtn', () => keys.r = true, () => keys.r = false);
    setup('jBtn', () => { if(jumpCount < 2) { vY = config.jump; jumpCount++; } });
    setup('aBtn', () => {
        weapon.classList.add('slash-anim');
        setTimeout(() => weapon.classList.remove('slash-anim'), 200);
        checkHit();
    });

    function checkHit() {
        enemies.forEach((e, i) => {
            const dist = Math.abs(pX - e.x);
            if(dist < 100 && Math.abs((window.innerHeight - pY) - (window.innerHeight - e.y)) < 100) {
                const el = document.getElementById('en-'+i);
                if(el) { el.style.transform = 'scale(2)'; el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }
            }
        });
    }

    function update() {
        if(!isPlaying) return;

        vX = keys.l ? -config.speed : (keys.r ? config.speed : vX * config.friction);
        vY += config.gravity;
        pX += vX; pY -= vY;

        platforms.forEach(p => {
            if (pX + 30 > p.x && pX < p.x + p.w && vY > 0 && pY <= p.y + 30 && pY > p.y) {
                pY = p.y + 30; vY = 0; jumpCount = 0;
            }
        });

        if(vX > 0.5) player.style.transform = "scaleX(1)";
        else if(vX < -0.5) player.style.transform = "scaleX(-1)";

        world.style.transform = `translateX(${-(pX - window.innerWidth/2)}px)`;
        player.style.left = pX + 'px'; player.style.bottom = pY + 'px';

        if(pY < -100) { pX = 150; pY = 400; vY = 0; }
        requestAnimationFrame(update);
    }
</script>
</body>
</html>
