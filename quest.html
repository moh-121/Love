<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya: Tactical Rescue ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: 'Segoe UI', sans-serif; height: 100vh; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #0a001a; }
        
        /* Atmospheric Background */
        #stars { position: absolute; width: 6000px; height: 100%; background: radial-gradient(circle, #fff 1px, transparent 1px) 0 0 / 80px 80px; opacity: 0.15; }
        #world { position: absolute; width: 5000px; height: 100%; will-change: transform; z-index: 10; }

        /* HUD */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 500; display: flex; flex-direction: column; gap: 5px; }
        .heart-row { display: flex; gap: 5px; font-size: 24px; }
        .dash-container { width: 120px; height: 10px; background: rgba(255,255,255,0.1); border: 1.5px solid #fff; border-radius: 5px; overflow: hidden; }
        #dash-bar { width: 100%; height: 100%; background: #00d4ff; transition: width 0.1s; }

        /* Character & VFX */
        .char { position: absolute; width: 45px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .haya-body { width: 38px; height: 48px; background: #fff; border-radius: 12px 12px 2px 2px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .cross { color: #ff4d6d; font-size: 14px; position: absolute; top: 20px; left: 13px; font-weight: 900; }
        .invincible { animation: blink 0.1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Enemies & Objects */
        .enemy { position: absolute; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 20; border-radius: 50%; }
        .germ { background: #8e44ad; border-bottom: 6px solid #4a235a; } /* Ground */
        .virus { background: #27ae60; border: 3px solid #2ecc71; animation: floatY 2s infinite ease-in-out; } /* Air */
        @keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .platform { position: absolute; background: #ff758c; border-top: 4px solid #ffafbd; border-bottom: 12px solid #a30026; border-radius: 6px; }
        .spike { position: absolute; width: 36px; height: 26px; background: #555; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .poof { position: absolute; width: 40px; height: 40px; background: white; border-radius: 50%; animation: explode 0.4s forwards; pointer-events: none; z-index: 100; opacity: 0.8; }
        @keyframes explode { to { transform: scale(2.5); opacity: 0; } }

        /* Buttons */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 1000; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 32px; backdrop-filter: blur(5px); }
        .jump-btn { width: 110px; height: 110px; background: #ff4d6d; border: none; box-shadow: 0 8px #a30026; font-weight: bold; font-size: 22px; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0); transition: 2s; }
        .love-msg { font-family: 'Caveat', cursive; font-size: 55px; color: white; opacity: 0; text-shadow: 0 0 20px #ff4d6d; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div class="heart-row" id="hearts">❤️ ❤️ ❤️</div>
            <div class="dash-container"><div id="dash-bar"></div></div>
        </div>

        <div id="stars"></div>
        <div id="world">
            <div id="player" class="char">
                <div id="haya-inner" class="haya-body"><div class="cross">✚</div></div>
            </div>
            
            <div id="mohammed" class="char" style="left: 4600px; bottom: 150px;">
                <div class="haya-body" style="background:#1a1a1a; border-top:15px solid #3d2b1f;"></div>
            </div>

            <div id="platforms-layer"></div>
            <div id="spikes-layer"></div>
            <div id="enemy-layer"></div>
        </div>

        <div id="controls">
            <div style="display:flex; gap:20px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
            <div style="display:flex; gap:15px; align-items: flex-end;">
                <div class="btn" id="dBtn" style="background:#00d4ff; border:none; box-shadow:0 6px #0089a7;">⚡</div>
                <div class="btn jump-btn" id="jBtn">JUMP</div>
            </div>
        </div>
    </div>
    <div id="overlay"><div class="love-msg" id="msg">Love Conquers All ❤️</div></div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const hayaInner = document.getElementById('haya-inner');
        const dashBar = document.getElementById('dash-bar');

        let pX = 150, pY = 400, vX = 0, vY = 0;
        let health = 3, jumps = 0, isInvincible = false;
        let dashReady = true, isDashing = false, camX = 0;

        const config = { gravity: 1.1, jump: -22, speed: 8.5, friction: 0.82, dashPower: 26 };

        // STRATEGIC LEVEL DESIGN
        const platforms = [
            {x: 0, y: 150, w: 600},       // Start
            {x: 750, y: 250, w: 300},     // 1st Enemy encounter
            {x: 1200, y: 400, w: 200},    // High platform
            {x: 1550, y: 200, w: 500},    // Spike tunnel
            {x: 2200, y: 450, w: 250},    // Floating island
            {x: 2600, y: 300, w: 400},    // Double enemy patrol
            {x: 3150, y: 500, w: 200},    // Extreme height
            {x: 3500, y: 350, w: 300},    // Pre-boss gap
            {x: 4000, y: 150, w: 1000}    // Final stretch
        ];

        const spikes = [
            {x: 1650, y: 200}, {x: 1850, y: 200}, // Mid-level hazards
            {x: 4100, y: 150}, {x: 4300, y: 150}  // Final guards
        ];

        // type 0: Ground, type 1: Air
        let enemyData = [
            {x: 850, y: 290, type: 0, range: 100, startX: 850, dir: 1, speed: 3},
            {x: 1300, y: 450, type: 1, range: 80, startY: 450, dir: 1, speed: 2}, // Guarding high road
            {x: 2650, y: 340, type: 0, range: 120, startX: 2650, dir: 1, speed: 4},
            {x: 2850, y: 340, type: 0, range: 120, startX: 2850, dir: -1, speed: 4}, // Pincer movement
            {x: 3850, y: 450, type: 1, range: 150, startY: 450, dir: 1, speed: 5}   // Fast air guard
        ];

        // Initialize Level
        platforms.forEach(p => {
            const d = document.createElement('div'); d.className = 'platform';
            Object.assign(d.style, {left:p.x+'px', bottom:p.y+'px', width:p.w+'px', height:'40px'});
            document.getElementById('platforms-layer').appendChild(d);
        });
        spikes.forEach(s => {
            const d = document.createElement('div'); d.className = 'spike';
            Object.assign(d.style, {left:s.x+'px', bottom:(s.y+36)+'px'});
            document.getElementById('spikes-layer').appendChild(d);
        });
        enemyData.forEach((en, i) => {
            const d = document.createElement('div');
            d.className = `enemy ${en.type === 0 ? 'germ' : 'virus'}`;
            d.id = 'en-'+i; d.innerHTML = en.type === 0 ? '😠' : '🦠';
            document.getElementById('enemy-layer').appendChild(d);
        });

        // INPUTS
        const keys = { left: false, right: false };
        const bind = (id, start, end) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
            if(end) el.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };
        bind('lBtn', () => keys.left = true, () => keys.left = false);
        bind('rBtn', () => keys.right = true, () => keys.right = false);
        bind('jBtn', () => { if(jumps < 2) { vY = config.jump; jumps++; } });
        bind('dBtn', () => {
            if(dashReady && !isDashing) {
                isDashing = true; dashReady = false;
                vX = (keys.left ? -1 : 1) * config.dashPower;
                dashBar.style.width = "0%";
                setTimeout(() => isDashing = false, 200);
                setTimeout(() => { dashReady = true; dashBar.style.width = "100%"; }, 1200);
            }
        });

        function update() {
            if(pX > 4500) { win(); return; }

            // Physics
            if(!isDashing) {
                if(keys.left) vX = -config.speed;
                else if(keys.right) vX = config.speed;
                else vX *= config.friction;
            }
            vY += config.gravity; pX += vX; pY -= vY;

            // Platform Collision
            platforms.forEach(p => {
                if (pX + 30 > p.x && pX + 10 < p.x + p.w) {
                    let top = p.y + 40;
                    if (vY > 0 && pY <= top && pY > top - 30) { pY = top; vY = 0; jumps = 0; }
                }
            });

            // Enemy Processing
            enemyData.forEach((en, i) => {
                if(en.dead) return;
                const el = document.getElementById('en-'+i);
                if(en.type === 0) { // Ground
                    en.x += en.dir * en.speed;
                    if(Math.abs(en.x - en.startX) > en.range) en.dir *= -1;
                } else { // Air
                    en.y += en.dir * en.speed;
                    if(Math.abs(en.y - en.startY) > en.range) en.dir *= -1;
                }
                el.style.left = en.x + 'px'; el.style.bottom = en.y + 'px';
                
                if(checkHit(player, el)) {
                    // STOMP: If Haya is falling and above enemy center
                    if(vY > 0 && pY > en.y + 15) {
                        spawnPoof(en.x, en.y);
                        en.dead = true; el.style.display = 'none';
                        vY = -18; // Super Bounce
                    } else if(!isInvincible) {
                        takeDamage();
                    }
                }
            });

            // Bounds
            if(pY < -100) reset();
            if(pX < 0) pX = 0;

            // Smooth Camera
            let target = -(pX - window.innerWidth/2);
            if(target > 0) target = 0;
            camX += (target - camX) * 0.1;
            world.style.transform = `translateX(${camX}px)`;
            
            // Visuals
            player.style.left = pX + 'px'; player.style.bottom = pY + 'px';
            player.style.transform = `scaleX(${vX < -0.1 ? -1 : 1})`;

            requestAnimationFrame(update);
        }

        function checkHit(a, b) {
            const r1 = a.getBoundingClientRect(), r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left+10 || r1.left > r2.right-10 || r1.bottom < r2.top+10 || r1.top > r2.bottom-10);
        }

        function takeDamage() {
            health--; isInvincible = true;
            hayaInner.classList.add('invincible');
            vY = -12; vX = (vX > 0) ? -12 : 12;
            document.getElementById('hearts').innerHTML = "❤️ ".repeat(health);
            if(health <= 0) reset();
            else setTimeout(() => { isInvincible = false; hayaInner.classList.remove('invincible'); }, 1500);
        }

        function spawnPoof(x, y) {
            const p = document.createElement('div'); p.className = 'poof';
            p.style.left = x + 'px'; p.style.bottom = y + 'px';
            world.appendChild(p);
            setTimeout(() => p.remove(), 400);
        }

        function reset() {
            health = 3; pX = 150; pY = 400; vX = 0; vY = 0; isInvincible = false;
            hayaInner.classList.remove('invincible');
            document.getElementById('hearts').innerHTML = "❤️ ❤️ ❤️";
            enemyData.forEach((en, i) => { 
                en.dead = false; 
                document.getElementById('en-'+i).style.display = 'flex'; 
            });
        }

        function win() {
            document.getElementById('overlay').style.background = "rgba(10,0,20,0.85)";
            document.getElementById('msg').style.opacity = 1;
            setTimeout(() => window.location.href="index.html", 5000);
        }

        update();
    </script>
</body>
</html>
