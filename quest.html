<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya 3D: Ultra Detail</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: fixed; top: 20px; left: 20px; color: #00f2ff; z-index: 100; pointer-events: none; text-shadow: 0 0 10px #00f2ff; }
        .stats { font-size: 12px; opacity: 0.7; letter-spacing: 2px; }
        
        #controls { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 200; box-sizing: border-box; }
        .btn { width: 80px; height: 80px; background: rgba(0, 242, 255, 0.1); border: 2px solid #00f2ff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; backdrop-filter: blur(10px); }
        .btn-act { background: #ff0055; border: none; box-shadow: 0 0 20px #ff0055; }
        
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: high-quality; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 24px; font-weight: bold;">HAYA_v3.0_4K</div>
    <div class="stats">SYSTEMS: ONLINE // NEURAL_LINK: ACTIVE</div>
</div>

<div id="controls">
    <div style="display:flex; gap:20px;"><div class="btn" id="lBtn">◀</div><div class="btn" id="rBtn">▶</div></div>
    <div style="display:flex; gap:20px;"><div class="btn btn-act" id="dBtn">⚡</div><div class="btn" id="jBtn">▲</div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// --- INITIALIZATION ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020005);
scene.fog = new THREE.FogExp2(0x020005, 0.05);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 4K Simulation
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// --- LIGHTING ---
const ambient = new THREE.AmbientLight(0x404040, 2);
scene.add(ambient);

const moonLight = new THREE.DirectionalLight(0x00f2ff, 2);
moonLight.position.set(10, 20, 10);
moonLight.castShadow = true;
scene.add(moonLight);

// --- NURSE HAYA 3D MODEL (PROCEDURAL) ---
const nurseGroup = new THREE.Group();

// Detailed Body (Dress)
const bodyGeo = new THREE.CylinderGeometry(0.5, 0.8, 1.8, 16);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.9;
body.castShadow = true;
nurseGroup.add(body);

// Head
const headGeo = new THREE.SphereGeometry(0.4, 32, 32);
const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
const head = new THREE.Mesh(headGeo, headMat);
head.position.y = 2.1;
nurseGroup.add(head);

// Hair (Detailed 3D clumps)
const hairGeo = new THREE.CapsuleGeometry(0.45, 0.2, 4, 16);
const hairMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f });
const hair = new THREE.Mesh(hairGeo, hairMat);
hair.position.y = 2.2;
nurseGroup.add(hair);

// Nurse Cap
const capGeo = new THREE.BoxGeometry(0.4, 0.2, 0.3);
const cap = new THREE.Mesh(capGeo, bodyMat);
cap.position.set(0, 2.5, 0);
nurseGroup.add(cap);

// Glowing Plasma Syringe
const syringeGroup = new THREE.Group();
const needleGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.2, 8);
const needleMat = new THREE.MeshStandardMaterial({ 
    color: 0x00ffff, 
    emissive: 0x00ffff, 
    emissiveIntensity: 5 
});
const needle = new THREE.Mesh(needleGeo, needleMat);
syringeGroup.add(needle);

const pointLight = new THREE.PointLight(0x00ffff, 2, 5);
syringeGroup.add(pointLight);

syringeGroup.position.set(0.8, 1.2, 0.5);
nurseGroup.add(syringeGroup);

scene.add(nurseGroup);

// --- WORLD DESIGN ---
const floorGeo = new THREE.PlaneGeometry(1000, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.5 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Neon Platforms
const platforms = [];
for(let i=0; i<20; i++) {
    const pGeo = new THREE.BoxGeometry(10, 1, 4);
    const pMat = new THREE.MeshStandardMaterial({ color: 0x1a0b2e });
    const p = new THREE.Mesh(pGeo, pMat);
    p.position.set(i * 15, Math.random() * 5 + 2, 0);
    p.castShadow = true;
    p.receiveShadow = true;
    scene.add(p);
    platforms.push(p);
    
    // Add neon trim
    const trimGeo = new THREE.BoxGeometry(10.1, 0.2, 4.1);
    const trimMat = new THREE.MeshBasicMaterial({ color: 0xff0055 });
    const trim = new THREE.Mesh(trimGeo, trimMat);
    p.add(trim);
    trim.position.y = 0.5;
}

// --- GAME LOGIC ---
let pX = 0, pY = 0, vX = 0, vY = 0;
let isGrounded = false, jumpCount = 0;
const keys = { l: false, r: false };

camera.position.set(0, 5, 15);

function animate() {
    requestAnimationFrame(animate);

    // Physics
    vX = keys.l ? -0.15 : (keys.r ? 0.15 : vX * 0.9);
    vY -= 0.015; // Gravity
    pX += vX; pY += vY;

    // Ground/Platform Collision
    isGrounded = false;
    if(pY <= 0) { pY = 0; vY = 0; isGrounded = true; jumpCount = 0; }
    
    platforms.forEach(p => {
        if(Math.abs(pX - p.position.x) < 5 && pY >= p.position.y + 0.5 && pY + vY <= p.position.y + 1) {
            pY = p.position.y + 1; vY = 0; isGrounded = true; jumpCount = 0;
        }
    });

    // Model Updates
    nurseGroup.position.set(pX, pY, 0);
    
    // Smooth Tilt & Rotation
    if(keys.l) nurseGroup.rotation.y = -Math.PI/2;
    if(keys.r) nurseGroup.rotation.y = Math.PI/2;
    
    // "Immersive" Procedural Animation (Squash/Stretch/Bob)
    const time = Date.now() * 0.005;
    if(Math.abs(vX) > 0.01 && isGrounded) {
        nurseGroup.rotation.z = Math.sin(time * 2) * 0.1; // Walking sway
        nurseGroup.scale.y = 1 + Math.sin(time * 4) * 0.05; // Walking bob
    } else if(!isGrounded) {
        nurseGroup.scale.y = 1.2; nurseGroup.scale.x = 0.8; // Stretching in air
    } else {
        nurseGroup.scale.set(1, 1, 1);
        nurseGroup.rotation.z = 0;
    }

    // Camera Cinematic Follow
    camera.position.x += (pX - camera.position.x) * 0.05;
    camera.lookAt(pX, pY + 2, 0);

    renderer.render(scene, camera);
}

// --- INPUTS ---
const setupBtn = (id, s, e) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
    if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
};

setupBtn('lBtn', () => keys.l = true, () => keys.l = false);
setupBtn('rBtn', () => keys.r = true, () => keys.r = false);
setupBtn('jBtn', () => { if(jumpCount < 2) { vY = 0.4; jumpCount++; } });
setupBtn('dBtn', () => { vX = (nurseGroup.rotation.y > 0 ? 1 : -1) * 0.8; });

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
