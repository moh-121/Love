<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya: Pixel Protocol</title>
    <style>
        body { margin: 0; background: #050010; overflow: hidden; font-family: 'Courier New', monospace; }
        #game { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; image-rendering: pixelated; width: 100%; height: 100%; }
        
        /* HUD */
        #ui { position: fixed; top: 20px; left: 20px; color: #fff; z-index: 10; pointer-events: none; }
        .bar { width: 120px; height: 12px; border: 2px solid #fff; background: #222; margin-top: 5px; }
        #dash-fill { width: 100%; height: 100%; background: #00ffff; box-shadow: 0 0 10px #00ffff; }

        /* Mobile Controls */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 20; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 3px solid #fff; color: #fff; 
               display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; border-radius: 8px; }
        .atk { background: #00ffff; color: #000; border: none; width: 85px; height: 85px; }
        .jmp { background: #ff0055; border: none; }
    </style>
</head>
<body>

<div id="ui">
    <div>HAYA_UNIT_01</div>
    <div class="bar"><div id="dash-fill"></div></div>
</div>

<div id="controls">
    <div style="display:flex; gap:15px;"><div class="btn" id="lBtn">◀</div><div class="btn" id="rBtn">▶</div></div>
    <div style="display:flex; gap:15px; align-items: flex-end;">
        <div class="btn atk" id="aBtn">💉</div>
        <div class="btn jmp" id="jBtn">JMP</div>
    </div>
</div>

<canvas id="screen"></canvas>

<script>
/** * PIXEL ART ENGINE 
 * We define the character as a grid of color codes 
 */
const Colors = {
    t: 'transparent',
    s: '#ffdbac', // skin
    h: '#3d2b1f', // hair
    w: '#ffffff', // white (nurse outfit)
    r: '#ff0055', // red (cross)
    b: '#000000', // black (eyes/shoes)
    c: '#00ffff'  // cyan (syringe/energy)
};

// 16x16 Sprite Map for Haya (Sideways Profile)
const hayaSprite = [
    "ttttthhhhttttttt",
    "tttthhhhhhhttttt",
    "ttthhwwwwwhhtttt", // w is the white cap
    "ttthwwrrrwwhtttt",
    "ttthhhhhhhhhtttt",
    "ttthssssssshhttt",
    "ttthsssssssbhttt", // b is the eye
    "tttssssssssstttt",
    "ttwwwwwwwwwwtttt",
    "ttwwwwrwwwwwtttt", // r is the cross
    "ttwwwwwwwwwwtttt",
    "ttwwwwwwwwwwtttt",
    "tttwwwww wwwtttt",
    "tttw wwww  wwttt",
    "tttbb bbb  bbbtt",
    "tttbb bbb  bbbtt"
];

const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const dashFill = document.getElementById('dash-fill');

let width, height, scale;
let pX = 100, pY = 200, vX = 0, vY = 0;
let facing = 1, jumpCount = 0, isDashing = false, dashTimer = 0;
const keys = { l: false, r: false };

const platforms = [
    {x: 0, y: 500, w: 800}, {x: 900, y: 350, w: 400}, {x: 1400, y: 200, w: 500}, {x: 2000, y: 400, w: 800}
];

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    scale = 4; // Each "pixel" in the art is 4x4 on screen
}

function drawPixelSprite(x, y, sprite, flip, stretchX=1, stretchY=1) {
    ctx.save();
    ctx.translate(x, y);
    if(flip === -1) ctx.scale(-1, 1);
    
    const pixelSize = scale;
    
    for(let row = 0; row < 16; row++) {
        for(let col = 0; col < 16; col++) {
            const char = sprite[row][col];
            if(char !== 't') {
                ctx.fillStyle = Colors[char];
                // Apply squash and stretch to the draw call
                ctx.fillRect(
                    (col - 8) * pixelSize * stretchX, 
                    (row - 16) * pixelSize * stretchY, 
                    pixelSize * stretchX + 0.5, 
                    pixelSize * stretchY + 0.5
                );
            }
        }
    }
    ctx.restore();
}

function update() {
    // Movement Logic
    if(!isDashing) {
        vX = keys.l ? -6 : (keys.r ? 6 : vX * 0.8);
        vY += 0.8; // Gravity
    }
    
    pX += vX; pY += vY;
    if(keys.l) facing = -1;
    if(keys.r) facing = 1;

    // Collision
    let grounded = false;
    platforms.forEach(plat => {
        if(pX > plat.x && pX < plat.x + plat.w && vY > 0 && pY >= plat.y && pY < plat.y + 30) {
            pY = plat.y; vY = 0; jumpCount = 0; grounded = true;
        }
    });

    // Drawing
    ctx.fillStyle = '#08001a';
    ctx.fillRect(0, 0, width, height);

    // Camera follow
    ctx.save();
    ctx.translate(-pX + width/2, 0);

    // Draw Platforms (Pixel style)
    platforms.forEach(plat => {
        ctx.fillStyle = '#ff0055';
        ctx.fillRect(plat.x, plat.y, plat.w, 40);
        ctx.fillStyle = '#fff';
        ctx.fillRect(plat.x, plat.y, plat.w, 4); // Highlight
    });

    // Animation variables
    let sX = 1, sY = 1;
    if(!grounded) { sX = 0.8; sY = 1.2; } // Stretch when jumping
    if(isDashing) { sX = 1.5; sY = 0.6; } // Squash when dashing

    drawPixelSprite(pX, pY, hayaSprite, facing, sX, sY);

    ctx.restore();

    // Respawn
    if(pY > height + 200) { pX = 100; pY = 200; vY = 0; }
    
    // UI
    dashFill.style.width = dashTimer > 0 ? (100 - (dashTimer/30)*100) + "%" : "100%";
    if(dashTimer > 0) dashTimer--;

    requestAnimationFrame(update);
}

// Controls
const setupBtn = (id, press, release) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); press(); });
    if(release) el.addEventListener('touchend', (e) => { e.preventDefault(); release(); });
};

setupBtn('lBtn', () => keys.l = true, () => keys.l = false);
setupBtn('rBtn', () => keys.r = true, () => keys.r = false);
setupBtn('jBtn', () => { if(jumpCount < 2) { vY = -18; jumpCount++; } });
setupBtn('aBtn', () => {
    if(dashTimer === 0) {
        isDashing = true; dashTimer = 40; vX = facing * 20; vY = 0;
        setTimeout(() => isDashing = false, 200);
    }
});

window.addEventListener('resize', resize);
resize();
update();
</script>
</body>
</html>
