<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya: Rescue Ops ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: sans-serif; height: 100vh; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* Parallax & World */
        .bg-layer { position: absolute; top: 0; left: 0; height: 100%; will-change: transform; }
        #stars { width: 6000px; background: radial-gradient(circle, #fff 1px, transparent 1px) 0 0 / 60px 60px; opacity: 0.2; }
        #world { position: absolute; width: 5000px; height: 100%; will-change: transform; z-index: 10; }

        /* UI */
        #ui-top { position: fixed; top: 20px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 500; }
        .heart-container { display: flex; gap: 8px; }
        .heart { font-size: 28px; transition: 0.3s; }
        .heart.lost { opacity: 0.2; transform: scale(0.5); }
        .dash-bar { width: 100px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; overflow: hidden; margin-top: 10px; border: 1px solid white; }
        #dash-fill { width: 100%; height: 100%; background: #00d4ff; transition: width 0.1s; }

        /* Characters */
        .char { position: absolute; width: 45px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .haya-body { width: 38px; height: 48px; background: #fff; border-radius: 12px 12px 2px 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .cross { color: #ff4d6d; font-size: 14px; position: absolute; top: 20px; left: 13px; font-weight: 900; }
        .dash-trail { position: absolute; opacity: 0.4; pointer-events: none; }

        /* Objects */
        .platform { position: absolute; background: #ff758c; border-top: 4px solid #ffafbd; border-bottom: 12px solid #a30026; border-radius: 4px; }
        .spike { position: absolute; width: 36px; height: 26px; background: #7f8c8d; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .kit { position: absolute; width: 30px; height: 30px; background: #fff; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: red; font-weight: bold; box-shadow: 0 0 15px #fff; animation: float 2s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Controls */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; z-index: 200; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; backdrop-filter: blur(5px); }
        .action-btns { display: flex; gap: 15px; align-items: flex-end; }
        .jump-btn { width: 100px; height: 100px; background: #ff4d6d; border: none; box-shadow: 0 6px #a30026; font-weight: bold; font-size: 20px; }
        .dash-btn { background: #00d4ff; border: none; box-shadow: 0 6px #0089a7; font-size: 24px; width: 70px; height: 70px; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: 2s; background: rgba(0,0,0,0); }
        .love-msg { font-family: 'Caveat', cursive; font-size: 50px; color: white; opacity: 0; text-shadow: 0 0 20px #ff4d6d; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-top">
            <div>
                <div class="heart-container" id="hearts">
                    <span class="heart" id="h1">❤️</span>
                    <span class="heart" id="h2">❤️</span>
                    <span class="heart" id="h3">❤️</span>
                </div>
                <div class="dash-bar"><div id="dash-fill"></div></div>
            </div>
        </div>

        <div id="stars" class="bg-layer"></div>
        <div id="world">
            <div id="player" class="char">
                <div id="haya-inner" class="haya-body"><div class="cross">✚</div></div>
            </div>
            <div id="mohammed" class="char" style="left: 4500px; bottom: 150px;">
                <div class="haya-body" style="background:#1a1a1a; border-top:15px solid #3d2b1f;"></div>
            </div>
            <div id="platforms-layer"></div>
            <div id="spikes-layer"></div>
            <div id="kits-layer"></div>
        </div>

        <div id="controls">
            <div style="display:flex; gap:15px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
            <div class="action-btns">
                <div class="btn dash-btn" id="dBtn">⚡</div>
                <div class="btn jump-btn" id="jBtn">JUMP</div>
            </div>
        </div>
    </div>
    <div id="overlay"><div class="love-msg" id="msg">Mission Accomplished ❤️</div></div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const hayaInner = document.getElementById('haya-inner');
        const dashFill = document.getElementById('dash-fill');

        let pX = 150, pY = 400, vX = 0, vY = 0;
        let health = 3, jumps = 0, isInvincible = false;
        let dashReady = true, isDashing = false;
        let camX = 0, targetCamX = 0;

        const config = { gravity: 1.1, jump: -21, speed: 9, friction: 0.8, dashPower: 25 };

        const platforms = [
            {x: 0, y: 150, w: 700}, {x: 850, y: 280, w: 250}, {x: 1200, y: 380, w: 200},
            {x: 1550, y: 250, w: 300}, {x: 2000, y: 420, w: 200}, {x: 2350, y: 300, w: 350},
            {x: 2850, y: 480, w: 200}, {x: 3200, y: 350, w: 250}, {x: 3600, y: 150, w: 1200}
        ];

        const spikes = [{x: 1600, y: 250}, {x: 2400, y: 300}, {x: 3800, y: 150}, {x: 4100, y: 150}];
        const kits = [{x: 1300, y: 450}, {x: 2950, y: 550}];

        // Build Level
        platforms.forEach(p => {
            const d = document.createElement('div'); d.className = 'platform';
            Object.assign(d.style, {left: p.x+'px', bottom: p.y+'px', width: p.w+'px', height: '40px'});
            document.getElementById('platforms-layer').appendChild(d);
        });
        spikes.forEach(s => {
            const d = document.createElement('div'); d.className = 'spike';
            Object.assign(d.style, {left: s.x+'px', bottom: (s.y+36)+'px'});
            document.getElementById('spikes-layer').appendChild(d);
        });
        kits.forEach(k => {
            const d = document.createElement('div'); d.className = 'kit'; d.innerHTML = '+';
            Object.assign(d.style, {left: k.x+'px', bottom: k.y+'px'});
            document.getElementById('kits-layer').appendChild(d);
        });

        const keys = { left: false, right: false };
        const setup = (id, fn) => document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); fn(); });
        
        setup('lBtn', () => keys.left = true);
        document.getElementById('lBtn').addEventListener('touchend', () => keys.left = false);
        setup('rBtn', () => keys.right = true);
        document.getElementById('rBtn').addEventListener('touchend', () => keys.right = false);
        
        setup('jBtn', () => {
            if(jumps < 2) { 
                vY = config.jump; jumps++; 
                hayaInner.style.transform = "scale(0.8, 1.2)"; // Stretch jump
            }
        });

        setup('dBtn', () => {
            if(dashReady && !isDashing) {
                isDashing = true; dashReady = false;
                let dir = keys.left ? -1 : 1;
                vX = dir * config.dashPower;
                dashFill.style.width = "0%";
                setTimeout(() => { isDashing = false; vX *= 0.5; }, 200);
                setTimeout(() => { dashReady = true; dashFill.style.width = "100%"; }, 1500);
            }
        });

        function update() {
            if(pX > 4400) { win(); return; }

            // Movement Logic
            if(!isDashing) {
                if(keys.left) vX = -config.speed;
                else if(keys.right) vX = config.speed;
                else vX *= config.friction;
            }

            vY += config.gravity;
            pX += vX; pY -= vY;

            // Collisions
            let onGround = false;
            platforms.forEach(p => {
                if (pX + 30 > p.x && pX + 10 < p.x + p.w) {
                    let top = p.y + 40;
                    if (vY > 0 && pY <= top && pY > top - 30) {
                        pY = top; vY = 0; onGround = true; jumps = 0;
                        hayaInner.style.transform = "scale(1.1, 0.9)"; // Squash land
                    }
                }
            });
            if(onGround) setTimeout(() => hayaInner.style.transform = "scale(1)", 100);

            // Spike/Kit Hit Detection
            document.querySelectorAll('.spike').forEach(s => {
                if(checkHit(player, s) && !isInvincible) damage();
            });
            document.querySelectorAll('.kit').forEach(k => {
                if(checkHit(player, k)) { health = Math.min(3, health+1); updateUI(); k.remove(); }
            });

            if(pY < -100) reset();
            
            // Camera & Render
            targetCamX = -(pX - window.innerWidth / 2);
            if(targetCamX > 0) targetCamX = 0;
            camX += (targetCamX - camX) * 0.1;
            world.style.transform = `translateX(${camX}px)`;
            
            player.style.left = pX + 'px'; player.style.bottom = pY + 'px';
            player.style.transform = `scaleX(${vX < -0.1 ? -1 : 1}) rotate(${vX}deg)`;

            requestAnimationFrame(update);
        }

        function checkHit(a, b) {
            const r1 = a.getBoundingClientRect(), r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left+5 || r1.left > r2.right-5 || r1.bottom < r2.top+5 || r1.top > r2.bottom-5);
        }

        function damage() {
            health--; updateUI(); isInvincible = true;
            hayaInner.style.background = "red";
            vY = -15; vX = -vX * 2;
            setTimeout(() => { isInvincible = false; hayaInner.style.background = "white"; }, 1000);
            if(health <= 0) reset();
        }

        function updateUI() {
            for(let i=1; i<=3; i++) document.getElementById('h'+i).className = i > health ? 'heart lost' : 'heart';
        }

        function reset() { health = 3; pX = 150; pY = 400; vX = 0; vY = 0; updateUI(); }

        function win() {
            world.style.transition = "transform 3s";
            world.style.transform = `translateX(${-(4500-window.innerWidth/2)}px)`;
            document.getElementById('overlay').style.background = "rgba(0,0,0,0.7)";
            setTimeout(() => document.getElementById('msg').style.opacity = 1, 1000);
            setTimeout(() => window.location.href="index.html", 6000);
        }

        update();
    </script>
</body>
</html>
