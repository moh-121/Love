<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rescue Mohammed! ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: -apple-system, sans-serif; height: 100vh; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 3500px; height: 100%; background: linear-gradient(to bottom, #110022 0%, #440011 100%); transition: transform 0.1s linear; }

        #hud { position: fixed; top: 30px; width: 100%; text-align: center; color: white; z-index: 100; font-size: 22px; text-shadow: 0 0 10px #ff4d6d; pointer-events: none; font-weight: bold; }

        /* CHARACTERS */
        .char { position: absolute; width: 40px; height: 55px; z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
        
        /* Haya (The Nurse) */
        .haya-body { width: 36px; height: 45px; background: #f8f9fa; border-radius: 10px 10px 2px 2px; position: absolute; bottom: 6px; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.1); }
        .stethoscope { position: absolute; width: 20px; height: 18px; border: 2.5px solid #444; border-radius: 50%; top: 4px; left: 8px; border-top-color: transparent; }
        .cross { color: #ff4d6d; font-size: 12px; position: absolute; top: 22px; left: 13px; font-weight: 900; }
        
        /* Mohammed (The Goal) */
        .mo-body { width: 36px; height: 45px; background: #2c3e50; border-radius: 10px 10px 2px 2px; position: absolute; bottom: 6px; border-top: 15px solid #5d4037; }
        .mo-eyes { position: absolute; top: 18px; width: 100%; text-align: center; color: white; font-size: 10px; font-weight: bold; }

        .foot { width: 14px; height: 8px; background: #111; border-radius: 2px; position: absolute; bottom: 0; }
        .foot-l { left: 4px; } .foot-r { right: 4px; }

        /* Level Elements */
        .platform { position: absolute; background: #ff758c; border-radius: 4px; border-bottom: 6px solid #a30026; z-index: 10; }
        .kiss-bubble { position: absolute; font-size: 40px; top: -50px; opacity: 0; transition: 0.5s; pointer-events: none; }

        /* Controls */
        #controls { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 200; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.15); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 2px solid rgba(255,255,255,0.3); backdrop-filter: blur(8px); color: white; }
        .heal-btn { width: 110px; background: #ff4d6d; border: none; font-weight: bold; font-size: 20px; box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4); }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">Haya, come find Mohammed! ❤️</div>
        <div id="world">
            <div id="player" class="char">
                <div class="haya-body">
                    <div class="stethoscope"></div>
                    <div class="cross">✚</div>
                </div>
                <div class="foot foot-l"></div>
                <div class="foot foot-r"></div>
            </div>

            <div id="mohammed" class="char" style="left: 3300px; bottom: 150px;">
                <div class="mo-body">
                    <div class="mo-eyes">^ _ ^</div>
                    <div id="kiss" class="kiss-bubble">💋😘</div>
                </div>
                <div class="foot foot-l"></div>
                <div class="foot foot-r"></div>
            </div>

            <div id="platforms-layer"></div>
        </div>

        <div id="controls">
            <div style="display:flex; gap:15px;">
                <div class="btn" id="lBtn">⬅️</div>
                <div class="btn" id="rBtn">➡️</div>
            </div>
            <div class="btn heal-btn" id="jBtn">JUMP</div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const mo = document.getElementById('mohammed');
        const kiss = document.getElementById('kiss');
        
        let pX = 100, pY = 400;
        let vX = 0, vY = 0;
        let isGrounded = false;
        let camX = 0;
        let won = false;

        const config = { gravity: 0.9, jump: -21, speed: 8.5, charW: 40, charH: 55 };

        // LEVEL DESIGN
        const level = [
            {x: 0, y: 100, w: 500, h: 40},
            {x: 650, y: 180, w: 200, h: 20},
            {x: 950, y: 300, w: 250, h: 20},
            {x: 1300, y: 220, w: 200, h: 20},
            {x: 1600, y: 380, w: 150, h: 20},
            {x: 1900, y: 250, w: 300, h: 20},
            {x: 2300, y: 450, w: 200, h: 20},
            {x: 2650, y: 320, w: 200, h: 20},
            {x: 3000, y: 150, w: 500, h: 40} // Platform where Mohammed is
        ];

        level.forEach(p => {
            const d = document.createElement('div');
            d.className = 'platform';
            d.style.left = p.x + 'px';
            d.style.bottom = p.y + 'px';
            d.style.width = p.w + 'px';
            d.style.height = p.h + 'px';
            document.getElementById('platforms-layer').appendChild(d);
        });

        const setupBtn = (id, start, end) => {
            const b = document.getElementById(id);
            b.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
            b.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };

        setupBtn('lBtn', () => { if(!won) vX = -config.speed; player.style.transform = 'scaleX(-1)'; }, () => vX = 0);
        setupBtn('rBtn', () => { if(!won) vX = config.speed; player.style.transform = 'scaleX(1)'; }, () => vX = 0);
        setupBtn('jBtn', () => { if(isGrounded && !won) { vY = config.jump; isGrounded = false; } }, () => {});

        function update() {
            pX += vX;
            vY += config.gravity;
            pY += vY;

            if(pX < 0) pX = 0;
            if(pX > 3400) pX = 3400;

            // Fall Reset
            if(pY > window.innerHeight + 100) {
                pX = 100; pY = 400; vY = 0;
            }

            // Collisions
            isGrounded = false;
            level.forEach(p => {
                let pTop = window.innerHeight - p.y - p.h - config.charH;
                if(vY >= 0 && pX + 30 > p.x && pX < p.x + p.w - 10) {
                    if(pY >= pTop - 15 && pY <= pTop + 10) {
                        pY = pTop; vY = 0; isGrounded = true;
                    }
                }
            });

            // Camera
            camX = -(pX - window.innerWidth / 3);
            if(camX > 0) camX = 0;
            if(camX < -(3500 - window.innerWidth)) camX = -(3500 - window.innerWidth);
            
            world.style.transform = `translateX(${camX}px)`;
            player.style.left = pX + 'px';
            player.style.top = pY + 'px';

            // WIN CONDITION: Distance to Mohammed
            let dist = Math.abs(pX - 3300);
            if(dist < 40 && isGrounded && !won) {
                won = true;
                vX = 0;
                kiss.style.opacity = "1";
                kiss.style.transform = "translateY(-30px)";
                setTimeout(() => {
                    alert("Muah! ❤️ You rescued Mohammed!");
                    window.location.href = "index.html";
                }, 1500);
            }

            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
