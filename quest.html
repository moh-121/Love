<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nurse Haya's Quest ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0a; font-family: -apple-system, sans-serif; height: 100vh; touch-action: none; }
        
        #game-world { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #10001f 0%, #3a0000 100%); }
        #hud { position: absolute; top: 40px; width: 100%; text-align: center; color: white; font-weight: bold; z-index: 100; font-size: 24px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        
        /* THE NURSE CHARACTER */
        #player { position: absolute; width: 40px; height: 50px; z-index: 50; transition: transform 0.1s; pointer-events: none; }
        
        /* White Scrubs Body */
        .char-body { 
            width: 100%; height: 75%; background: white; border-radius: 12px 12px 4px 4px; 
            position: absolute; top: 0; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.05);
            animation: breathe 2s infinite ease-in-out;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 5px;
        }
        
        /* Red Cross Symbol */
        .char-symbol { position: absolute; top: 15px; color: #ff4d6d; font-weight: bold; font-size: 10px; opacity: 0.8; }
        
        /* Stethoscope */
        .stethoscope { position: absolute; width: 22px; height: 22px; border: 2px solid #333; border-radius: 50%; top: 4px; border-top-color: transparent; border-right-color: transparent; }
        .stethoscope::after { content: ''; position: absolute; width: 8px; height: 8px; background: silver; border-radius: 50%; bottom: -5px; right: -5px; box-shadow: 0 0 5px rgba(0,0,0,0.3); }

        .char-face { width: 100%; text-align: center; font-size: 14px; color: #333; font-weight: bold; position: relative; z-index: 2; margin-bottom: 15px; }
        .feet { position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; }
        .foot { width: 12px; height: 12px; background: #333; border-radius: 4px; }

        /* Animations */
        @keyframes breathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.05); } }
        .walking .foot-l { animation: step 0.15s infinite alternate; }
        .walking .foot-r { animation: step 0.15s infinite alternate-reverse; }
        @keyframes step { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        
        /* Platforms & Items */
        .ground { position: absolute; bottom: 0; width: 100%; height: 60px; background: #331a00; border-top: 5px solid #ff4d6d; z-index: 10; }
        .platform { position: absolute; background: rgba(255, 117, 140, 0.9); border-radius: 10px; border-bottom: 5px solid #b3002d; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 10; }
        .item { position: absolute; font-size: 35px; z-index: 5; animation: float 2s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Controls */
        #controls { position: absolute; bottom: 80px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 200; }
        .btn { width: 85px; height: 85px; background: rgba(255,255,255,0.2); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 35px; border: 2px solid white; backdrop-filter: blur(5px); }
        .jump-btn { background: rgba(255, 77, 109, 0.5); width: 100px; border-color: #ff4d6d; color: white; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

    <div id="game-world">
        <div id="hud">💖 <span id="pts">0</span> / 150</div>
        
        <div id="player">
            <div class="char-body">
                <div class="stethoscope"></div>
                <div class="char-symbol">✚</div>
                <div class="char-face">^ _ ^</div>
            </div>
            <div class="feet"><div class="foot foot-l"></div><div class="foot foot-r"></div></div>
        </div>
        
        <div class="ground"></div>

        <div id="controls">
            <div style="display:flex; gap:15px;">
                <div class="btn" id="leftBtn">⬅️</div>
                <div class="btn" id="rightBtn">➡️</div>
            </div>
            <div class="btn jump-btn" id="jumpBtn">HEAL</div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const pts = document.getElementById('pts');
        const world = document.getElementById('game-world');
        
        let pX = 50, pY = 0, score = 0;
        let velX = 0, velY = 0, jumping = false;
        const speed = 7, gravity = 0.85, jumpPower = -19.5; // Slightly faster and higher

        const platforms = [
            {l: 50, b: 180, w: 140},
            {l: 220, b: 320, w: 140},
            {l: 40, b: 450, w: 140},
            {l: 200, b: 580, w: 150},
            {l: 30, b: 680, w: 140}
        ];

        platforms.forEach(p => {
            const div = document.createElement('div');
            div.className = 'platform';
            div.style.left = p.l + 'px';
            div.style.bottom = p.b + 'px';
            div.style.width = p.w + 'px';
            div.style.height = '15px';
            world.appendChild(div);
        });

        const lBtn = document.getElementById('leftBtn');
        const rBtn = document.getElementById('rightBtn');
        const jBtn = document.getElementById('jumpBtn');

        lBtn.ontouchstart = (e) => { e.preventDefault(); velX = -speed; player.classList.add('walking'); player.style.transform = 'scaleX(-1)'; };
        rBtn.ontouchstart = (e) => { e.preventDefault(); velX = speed; player.classList.add('walking'); player.style.transform = 'scaleX(1)'; };
        lBtn.ontouchend = rBtn.ontouchend = () => { velX = 0; player.classList.remove('walking'); };
        jBtn.ontouchstart = (e) => { e.preventDefault(); if(!jumping) { velY = jumpPower; jumping = true; } };

        function spawn() {
            const item = document.createElement('div');
            item.className = 'item';
            const type = Math.random();
            item.innerHTML = type > 0.9 ? "🌹" : (type > 0.7 ? "⭐" : "❤️");
            item.dataset.val = type > 0.9 ? 15 : (type > 0.7 ? 5 : 1);
            item.style.left = Math.random() * 80 + 5 + "vw";
            item.style.bottom = Math.random() * 70 + 15 + "vh";
            world.appendChild(item);
        }
        for(let i=0; i<8; i++) spawn();

        function loop() {
            pX += velX;
            velY += gravity;
            pY += velY;

            let groundPos = window.innerHeight - 60 - 50; 
            if(pY > groundPos) { pY = groundPos; velY = 0; jumping = false; }

            platforms.forEach(p => {
                let pTop = window.innerHeight - p.b - 15 - 50;
                if(pX + 35 > p.l && pX < p.l + p.w && pY + 50 > pTop && pY + 50 < pTop + 20 && velY > 0) {
                    pY = pTop; velY = 0; jumping = false;
                }
            });

            if(pX < 0) pX = 0;
            if(pX > window.innerWidth - 40) pX = window.innerWidth - 40;

            player.style.left = pX + 'px';
            player.style.top = pY + 'px';

            document.querySelectorAll('.item').forEach(it => {
                const pR = player.getBoundingClientRect();
                const iR = it.getBoundingClientRect();
                if(!(pR.right < iR.left || pR.left > iR.right || pR.bottom < iR.top || pR.top > iR.bottom)) {
                    score += parseInt(it.dataset.val);
                    pts.innerText = Math.min(score, 150);
                    it.remove(); spawn();
                    if(score >= 150) {
                        alert("Nurse Haya, mission accomplished! Your patient is ready to read your letter... ❤️");
                        window.location.href = "index.html";
                    }
                }
            });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
