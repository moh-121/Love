<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Haya: Stable PC Edition</title>
    <style>
        :root { --cyan: #00f2ff; --red: #ff0055; --dark: #05020a; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: white; }

        /* Stage and Camera */
        #viewport { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #1a0b2e, #000); overflow: hidden; }
        #world { position: absolute; width: 100%; height: 100%; will-change: transform; }

        /* High-Detail Character */
        #haya { 
            position: absolute; width: 50px; height: 80px; 
            z-index: 100; will-change: transform;
            display: flex; flex-direction: column; align-items: center;
        }
        .haya-head { width: 30px; height: 30px; background: #ffe0bd; border-radius: 50%; border-top: 5px solid #2d1b10; position: relative; }
        .haya-head::after { content: ''; position: absolute; width: 4px; height: 6px; background: #000; right: 8px; top: 12px; border-radius: 50%; }
        .haya-coat { width: 35px; height: 45px; background: #fff; border-radius: 5px 5px 15px 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); position: relative; }
        .haya-coat::before { content: '✚'; color: var(--red); position: absolute; top: 5px; right: 5px; font-size: 10px; font-weight: bold; }
        .syringe { width: 6px; height: 40px; background: var(--cyan); position: absolute; right: -10px; top: 10px; box-shadow: 0 0 15px var(--cyan); border-radius: 2px; }

        /* Platforms */
        .platform { position: absolute; background: linear-gradient(to bottom, #2d1b4d, #110524); border-top: 3px solid var(--cyan); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* UI */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .bar { width: 200px; height: 8px; background: rgba(255,255,255,0.1); border: 1px solid var(--cyan); margin-top: 10px; }
        #hp-fill { width: 100%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        
        #debug { position: fixed; top: 20px; right: 20px; font-size: 12px; opacity: 0.5; text-align: right; pointer-events: none; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="hud">
        <div style="font-weight: bold; letter-spacing: 2px;">HAYA // BIOSYSTEM</div>
        <div class="bar"><div id="hp-fill"></div></div>
    </div>

    <div id="debug">
        X: <span id="dx">0</span> | Y: <span id="dy">0</span><br>
        STATUS: <span id="ds">INIT</span>
    </div>

    <div id="world">
        <div id="haya">
            <div class="haya-head"></div>
            <div class="haya-coat">
                <div class="syringe" id="weapon"></div>
            </div>
        </div>
        <div id="entities"></div>
    </div>
</div>

<script>
    const world = document.getElementById('world'), haya = document.getElementById('haya');
    const dx = document.getElementById('dx'), dy = document.getElementById('dy'), ds = document.getElementById('ds');

    // Physics Settings
    let pX = 200, pY = 300, vX = 0, vY = 0;
    let camX = 0;
    const gravity = 0.8, friction = 0.85, speed = 1.2, jumpPower = -16;
    const keys = {};

    // Generate Level
    const map = [
        {x: 0, y: 500, w: 1000},   // Starting Floor
        {x: 1100, y: 350, w: 400}, // Floating Plat 1
        {x: 1600, y: 200, w: 500}, // Floating Plat 2
        {x: 2200, y: 400, w: 800}  // Final Floor
    ];

    map.forEach(p => {
        const d = document.createElement('div');
        d.className = 'platform';
        Object.assign(d.style, { left: p.x+'px', top: p.y+'px', width: p.w+'px', height: '40px' });
        document.getElementById('entities').appendChild(d);
    });

    // Inputs
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    window.onmousedown = () => attack();

    function attack() {
        document.getElementById('weapon').style.transform = "rotate(90deg) scale(1.5)";
        setTimeout(() => document.getElementById('weapon').style.transform = "rotate(0deg) scale(1)", 150);
    }

    function update() {
        // Movement logic
        if (keys['KeyA'] || keys['ArrowLeft']) vX -= speed;
        if (keys['KeyD'] || keys['ArrowRight']) vX += speed;
        if ((keys['Space'] || keys['KeyW']) && Math.abs(vY) < 0.1) vY = jumpPower;

        vX *= friction;
        vY += gravity;
        pX += vX; pY += vY;

        // Collision Detection
        let onGround = false;
        map.forEach(p => {
            if (pX + 40 > p.x && pX < p.x + p.w) {
                // Falling onto a platform
                if (vY > 0 && pY + 80 >= p.y && pY + 80 <= p.y + 40) {
                    pY = p.y - 80;
                    vY = 0;
                    onGround = true;
                }
            }
        });

        // Facing direction
        if (vX > 0.2) haya.style.transform = `translate(${pX}px, ${pY}px) scaleX(1)`;
        else if (vX < -0.2) haya.style.transform = `translate(${pX}px, ${pY}px) scaleX(-1)`;
        else haya.style.transform = `translate(${pX}px, ${pY}px)`;

        // Camera Lerping
        const targetCam = -(pX - window.innerWidth / 2);
        camX += (targetCam - camX) * 0.1;
        world.style.transform = `translateX(${camX}px)`;

        // Debug Output
        dx.innerText = Math.round(pX);
        dy.innerText = Math.round(pY);
        ds.innerText = onGround ? "GROUNDED" : "AIRBORNE";

        // Fall Safety (Respawn)
        if (pY > 1000) {
            pX = 200; pY = 300; vX = 0; vY = 0;
        }

        requestAnimationFrame(update);
    }

    // Launch Engine
    update();
</script>
</body>
</html>
