<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Haya: Clinical Shadow</title>
    <style>
        :root { --cyan: #00f2ff; --red: #ff0055; --bg: #030208; --white: #f0f0f5; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Inter', sans-serif; color: white; }

        #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; will-change: transform; }

        /* --- THE CHARACTER: HAYA (SQUASH & STRETCH RIG) --- */
        #haya { 
            position: absolute; width: 50px; height: 80px; 
            z-index: 1000; transform-origin: bottom center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .haya-sprite { position: relative; width: 100%; height: 100%; }

        /* Floating Hair (Ori-style physics) */
        .hair { 
            position: absolute; top: -38px; left: 8px; width: 40px; height: 30px; 
            background: #2a1a10; border-radius: 20px 20px 5px 15px; 
            transition: transform 0.3s; z-index: 10;
        }

        /* The Clinical Coat (Cape-like physics) */
        .coat { 
            position: absolute; top: -5px; left: 5px; width: 40px; height: 60px; 
            background: var(--white); border-radius: 10px 10px 25px 25px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1), 0 10px 30px rgba(0,0,0,0.4);
            transition: transform 0.2s, border-radius 0.2s;
        }

        .arm { 
            position: absolute; top: 10px; right: -8px; width: 10px; height: 35px; 
            background: var(--white); border-radius: 5px; transform-origin: top center;
            z-index: 15; transition: transform 0.1s;
        }
        
        /* The Plasma Blade */
        .blade { 
            position: absolute; bottom: -40px; left: 2px; width: 6px; height: 50px; 
            background: var(--cyan); border-radius: 3px; 
            box-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
            opacity: 0.8;
        }

        /* --- VISUAL EFFECTS (JUICE) --- */
        .slash-arc {
            position: absolute; width: 120px; height: 120px; border: 6px solid var(--cyan);
            border-radius: 50%; border-right-color: transparent; border-top-color: transparent;
            opacity: 0; pointer-events: none; z-index: 2000;
        }
        .slash-active { animation: slash-glow 0.25s ease-out; }
        @keyframes slash-glow {
            0% { opacity: 1; transform: scale(0.6) rotate(-45deg); filter: brightness(2); }
            100% { opacity: 0; transform: scale(1.4) rotate(120deg); filter: brightness(1); }
        }

        .dust { 
            position: absolute; background: rgba(255,255,255,0.2); border-radius: 50%; 
            pointer-events: none; animation: dust-fade 0.5s forwards; 
        }
        @keyframes dust-fade { to { opacity: 0; transform: translateY(-20px) scale(0); } }

        /* --- ENVIRONMENT --- */
        .plat { 
            position: absolute; background: linear-gradient(180deg, #160d26 0%, #05020a 100%); 
            border-top: 2px solid rgba(0, 242, 255, 0.3); border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* --- UI --- */
        #hud { position: fixed; top: 30px; left: 30px; letter-spacing: 5px; font-weight: 200; opacity: 0.8; }
        .hp-box { width: 200px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 10px; }
        .hp-fill { width: 100%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
    </style>
</head>
<body>

<div id="stage">
    <div id="hud">
        HAYA // PROTOCOL
        <div class="hp-box"><div class="hp-fill"></div></div>
    </div>
    <div id="world">
        <div id="haya">
            <div class="haya-sprite">
                <div class="slash-arc" id="slash"></div>
                <div class="hair" id="hair"></div>
                <div class="coat" id="coat"></div>
                <div class="arm" id="arm"><div class="blade"></div></div>
            </div>
        </div>
        <div id="elements"></div>
    </div>
</div>

<script>
    const world = document.getElementById('world'), haya = document.getElementById('haya');
    const coat = document.getElementById('coat'), hair = document.getElementById('hair');
    const arm = document.getElementById('arm'), slash = document.getElementById('slash');

    let pX = 300, pY = 400, vX = 0, vY = 0;
    let camX = 0, isAttacking = false, facing = 1;
    
    // Pro Physics Constants
    const config = {
        gravity: 0.75,
        friction: 0.84,
        accel: 1.4,
        jump: -16,
        lerp: 0.1 // Camera smoothness
    };

    const keys = {};
    const map = [
        {x: 0, y: 600, w: 1500}, {x: 1600, y: 450, w: 500}, 
        {x: 2200, y: 300, w: 400}, {x: 2700, y: 500, w: 1200}
    ];

    map.forEach(p => {
        const d = document.createElement('div'); d.className = 'plat';
        Object.assign(d.style, { left: p.x+'px', top: p.y+'px', width: p.w+'px', height: '200px' });
        document.getElementById('elements').appendChild(d);
    });

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    window.onmousedown = () => attack();

    function attack() {
        if(isAttacking) return;
        isAttacking = true;
        
        // Hit-stop effect (pause the world slightly for impact)
        document.body.style.filter = "brightness(1.5)";
        slash.classList.add('slash-active');
        arm.style.transform = "rotate(140deg) scale(1.3)";
        
        setTimeout(() => {
            isAttacking = false;
            document.body.style.filter = "none";
            slash.classList.remove('slash-active');
            arm.style.transform = "rotate(0deg) scale(1)";
        }, 200);
    }

    function createDust(x, y) {
        for(let i=0; i<5; i++) {
            const d = document.createElement('div'); d.className = 'dust';
            const size = Math.random() * 10 + 5;
            Object.assign(d.style, {
                left: x + 'px', top: y + 'px', 
                width: size+'px', height: size+'px'
            });
            world.appendChild(d);
            setTimeout(() => d.remove(), 500);
        }
    }

    function update() {
        // Movement Logic
        if (keys['KeyA'] || keys['ArrowLeft']) { vX -= config.accel; facing = -1; }
        if (keys['KeyD'] || keys['ArrowRight']) { vX += config.accel; facing = 1; }
        vX *= config.friction;
        vY += config.gravity;
        
        pX += vX; pY += vY;

        // Collision & Landing Juice
        let grounded = false;
        map.forEach(p => {
            if (pX + 30 > p.x && pX < p.x + p.w) {
                if (vY > 0 && pY + 80 >= p.y && pY + 80 <= p.y + 40) {
                    if (vY > 5) { // Hard landing juice
                        createDust(pX + 25, pY + 80);
                        haya.style.transform = `translate3d(${pX}px, ${pY}px, 0) scale(1.3, 0.7)`;
                    }
                    pY = p.y - 80; vY = 0; grounded = true;
                }
            }
        });

        // Variable Jump (Higher if held - Hollow Knight style)
        if ((keys['Space'] || keys['KeyW']) && grounded) {
            vY = config.jump;
            haya.style.transform = `translate3d(${pX}px, ${pY}px, 0) scale(0.7, 1.4)`;
            createDust(pX + 25, pY + 80);
        }

        // --- THE "ALIVE" ANIMATION LOGIC ---
        
        // 1. Squash and Stretch (Dynamic scaling)
        if (!grounded) {
            let stretch = 1 + Math.abs(vY) * 0.02;
            let squash = 1 - Math.abs(vY) * 0.02;
            haya.style.transform = `translate3d(${pX}px, ${pY}px, 0) scaleX(${squash * facing}) scaleY(${stretch})`;
        } else if (Math.abs(vX) < 1) {
            // Idle breathing
            const breath = 1 + Math.sin(Date.now() * 0.005) * 0.02;
            haya.style.transform = `translate3d(${pX}px, ${pY}px, 0) scaleX(${facing}) scaleY(${breath})`;
        } else {
            // Running lean
            const lean = Math.min(Math.abs(vX) * 2, 15);
            haya.style.transform = `translate3d(${pX}px, ${pY}px, 0) scaleX(${facing}) rotate(${lean * facing}deg)`;
        }

        // 2. Physics-based Hair & Coat
        hair.style.transform = `translateX(${-vX * 0.5}px) rotate(${-vX}deg)`;
        coat.style.transform = `skewX(${-vX * 1.5}deg)`;

        // 3. Smooth Camera
        const targetCam = -(pX - window.innerWidth / 2.5);
        camX += (targetCam - camX) * config.lerp;
        world.style.transform = `translateX(${camX}px)`;

        // Fall Safety
        if (pY > 1500) { pX = 300; pY = 400; vX = 0; vY = 0; }

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
