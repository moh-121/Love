<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Haya: Clinical Cube</title>
    <style>
        :root { --cyan: #00f2ff; --red: #ff0055; --bg: #030109; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Inter', sans-serif; }

        /* --- STAGE --- */
        #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 100%; height: 100%; will-change: transform; }

        /* --- FIXED PLATFORMS --- */
        .platform { 
            position: absolute; 
            background: linear-gradient(180deg, #1a0b2e 0%, #05020a 100%); 
            border-top: 2px solid var(--cyan); 
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 5;
        }

        /* --- HAYA: THE NURSE CUBE --- */
        #haya { 
            position: absolute; width: 60px; height: 60px; 
            z-index: 100; will-change: transform;
            transform-origin: bottom center;
        }

        .haya-body {
            position: relative; width: 100%; height: 100%;
            background: #f5f5f5; border-radius: 12px;
            box-shadow: inset -4px -4px 10px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #fff;
        }

        /* Nurse Details */
        .cap { position: absolute; top: -12px; width: 30px; height: 12px; background: #fff; border-radius: 5px 5px 0 0; border: 1px solid #ddd; display: flex; justify-content: center; }
        .cap::after { content: '✚'; color: var(--red); font-size: 10px; font-weight: bold; }
        
        .eyes { display: flex; gap: 12px; }
        .eye { width: 10px; height: 14px; background: #111; border-radius: 50%; position: relative; }
        .pupil { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; top: 2px; left: 3px; }

        /* Summoned Syringe */
        #weapon {
            position: absolute; right: -15px; top: 10px; width: 8px; height: 45px;
            background: var(--cyan); border-radius: 4px; opacity: 0;
            box-shadow: 0 0 20px var(--cyan); transform: scaleY(0);
            transition: 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .attacking #weapon { opacity: 1; transform: scaleY(1.2) rotate(15deg); }

        /* --- EFFECTS --- */
        .slash-fx { 
            position: absolute; inset: -40px; border: 4px solid var(--cyan); 
            border-radius: 50%; border-right-color: transparent; border-bottom-color: transparent;
            opacity: 0; pointer-events: none; transform: rotate(-45deg);
        }
        .attacking .slash-fx { animation: slashPulse 0.3s ease-out; }
        @keyframes slashPulse { 0% { opacity: 1; transform: scale(0.5) rotate(-45deg); } 100% { opacity: 0; transform: scale(1.5) rotate(45deg); } }

        #hud { position: fixed; top: 30px; left: 30px; color: var(--cyan); letter-spacing: 3px; font-size: 12px; z-index: 1000; }
    </style>
</head>
<body>

<div id="stage">
    <div id="hud">SYSTEM // HAYA_CUBE_V2</div>
    <div id="world">
        <div id="haya">
            <div class="slash-fx"></div>
            <div class="haya-body">
                <div class="cap"></div>
                <div class="eyes">
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <div id="weapon"></div>
            </div>
        </div>

        <div id="platforms"></div>
    </div>
</div>

<script>
    const world = document.getElementById('world'), haya = document.getElementById('haya');
    const weapon = document.getElementById('weapon');

    // Physics Constants
    let pX = 200, pY = 400, vX = 0, vY = 0;
    let camX = 0, facing = 1, isGrounded = false;
    const gravity = 0.8, friction = 0.85, accel = 1.4, jumpStr = -18;
    
    const keys = {};

    // Fixed Level Map (Static coordinates)
    const map = [
        {x: 0, y: 600, w: 1000},
        {x: 1100, y: 450, w: 400},
        {x: 1600, y: 300, w: 400},
        {x: 2100, y: 500, w: 1200}
    ];

    map.forEach(p => {
        const div = document.createElement('div');
        div.className = 'platform';
        Object.assign(div.style, { left: p.x+'px', top: p.y+'px', width: p.w+'px', height: '500px' });
        document.getElementById('platforms').appendChild(div);
    });

    // Inputs
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    window.onmousedown = () => {
        haya.classList.add('attacking');
        setTimeout(() => haya.classList.remove('attacking'), 250);
    };

    function update() {
        // Horizontal Movement
        if (keys['KeyA'] || keys['ArrowLeft']) { vX -= accel; facing = -1; }
        if (keys['KeyD'] || keys['ArrowRight']) { vX += accel; facing = 1; }
        vX *= friction;

        // Vertical Movement
        vY += gravity;
        pX += vX; pY += vY;

        // --- STABLE COLLISION ---
        isGrounded = false;
        map.forEach(p => {
            // Check if Haya is within platform width
            if (pX + 50 > p.x && pX < p.x + p.w) {
                // Check if Haya is landing on the top surface
                if (vY > 0 && pY + 60 >= p.y && pY + 60 <= p.y + 40) {
                    pY = p.y - 60;
                    vY = 0;
                    isGrounded = true;
                }
            }
        });

        // Jump (Space or W)
        if ((keys['Space'] || keys['KeyW']) && isGrounded) {
            vY = jumpStr;
            isGrounded = false;
            // Squash and Stretch Jump
            haya.style.transform = `translate3d(${pX}px, ${pY}px, 0) scale(0.8, 1.3)`;
        }

        // --- ANIMATION & JUICE ---
        // Smooth out the scaling from jumps/landings
        if (isGrounded) {
            const lean = Math.min(Math.abs(vX) * 1.5, 15) * facing;
            haya.style.transform = `translate3d(${pX}px, ${pY}px, 0) scaleX(${facing}) rotate(${lean}deg)`;
        } else {
            // Air tilt
            haya.style.transform = `translate3d(${pX}px, ${pY}px, 0) scaleX(${facing}) rotate(${vY}deg)`;
        }

        // Camera Lerp (Smoothly follow Haya)
        const targetCam = -(pX - window.innerWidth / 2.5);
        camX += (targetCam - camX) * 0.1;
        world.style.transform = `translateX(${camX}px)`;

        // Fall Safety
        if (pY > 1500) { pX = 200; pY = 400; vX = 0; vY = 0; }

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
