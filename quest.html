<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rescue Mohammed! ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: sans-serif; height: 100vh; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 4500px; height: 100%; background: linear-gradient(to bottom, #0f001a 0%, #2b0000 100%); will-change: transform; transition: transform 0.1s linear; }

        /* CHARACTERS */
        .char { position: absolute; width: 45px; height: 60px; z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
        .haya-body { width: 38px; height: 48px; background: #fff; border-radius: 12px 12px 2px 2px; position: absolute; bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .stethoscope { position: absolute; width: 22px; height: 20px; border: 2.5px solid #333; border-radius: 50%; top: 4px; left: 8px; border-top-color: transparent; }
        .cross { color: #ff4d6d; font-size: 14px; position: absolute; top: 20px; left: 13px; font-weight: 900; }
        
        /* Mohammed Redesign */
        .mo-body { width: 40px; height: 52px; background: #1a1a1a; border-radius: 10px 10px 2px 2px; position: absolute; bottom: 8px; border-top: 18px solid #3d2b1f; }
        .mo-shirt { position: absolute; width: 12px; height: 20px; background: #34495e; top: 18px; left: 14px; border-radius: 2px; }

        .foot { width: 14px; height: 10px; background: #111; border-radius: 3px; position: absolute; bottom: 0; }
        .foot-l { left: 6px; } .foot-r { right: 6px; }

        .spike { position: absolute; width: 40px; height: 30px; background: #7f8c8d; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); z-index: 5; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: background 2s; }
        .love-msg { font-family: 'Caveat', cursive; font-size: 45px; color: white; opacity: 0; text-shadow: 0 0 20px #ff4d6d; text-align: center; transition: 2s; }
        
        .platform { position: absolute; background: #ff758c; border-radius: 4px; border-bottom: 8px solid #a30026; z-index: 10; }
        #controls { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 200; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 2px solid white; color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="world">
            <div id="player" class="char">
                <div class="haya-body"><div class="stethoscope"></div><div class="cross">✚</div></div>
                <div class="foot foot-l"></div><div class="foot foot-r"></div>
            </div>

            <div id="mohammed" class="char" style="left: 4200px; bottom: 150px;">
                <div class="mo-body"><div class="mo-shirt"></div><div style="width:100%;text-align:center;color:white;position:absolute;top:18px;font-weight:bold;font-size:10px;">^ _ ^</div></div>
                <div class="foot foot-l"></div><div class="foot foot-r"></div>
            </div>
            <div id="platforms-layer"></div>
            <div id="spikes-layer"></div>
        </div>

        <div id="controls">
            <div style="display:flex; gap:15px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
            <div class="btn" id="jBtn" style="width:110px; border-radius:30px; background:#ff4d6d; font-weight:bold;">JUMP</div>
        </div>
    </div>
    <div id="overlay"><div class="love-msg" id="msg">You Rescued My Heart ❤️</div></div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const mo = document.getElementById('mohammed');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');

        let pX = 100, pY = 400, vX = 0, vY = 0, isGrounded = false, won = false;
        const config = { gravity: 0.9, jump: -21, speed: 8, charW: 45, charH: 60 };

        const platforms = [
            {x: 0, y: 100, w: 600}, {x: 750, y: 220, w: 200}, {x: 1050, y: 350, w: 150},
            {x: 1300, y: 200, w: 250}, {x: 1700, y: 380, w: 150}, {x: 2000, y: 250, w: 300},
            {x: 2450, y: 400, w: 180}, {x: 2800, y: 300, w: 200}, {x: 3150, y: 450, w: 150},
            {x: 3500, y: 280, w: 200}, {x: 3850, y: 150, w: 650}
        ];

        const spikes = [{x: 1350, y: 220}, {x: 2050, y: 270}, {x: 3950, y: 170}, {x: 4050, y: 170}];

        platforms.forEach(p => {
            const d = document.createElement('div'); d.className = 'platform';
            d.style.left = p.x + 'px'; d.style.bottom = p.y + 'px'; d.style.width = p.w + 'px'; d.style.height = '20px';
            document.getElementById('platforms-layer').appendChild(d);
        });

        spikes.forEach(s => {
            const d = document.createElement('div'); d.className = 'spike';
            d.style.left = s.x + 'px'; d.style.bottom = s.y + 'px';
            document.getElementById('spikes-layer').appendChild(d);
        });

        const setupBtn = (id, start, end) => {
            const b = document.getElementById(id);
            b.addEventListener('touchstart', (e) => { e.preventDefault(); if(!won) start(); });
            b.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };

        setupBtn('lBtn', () => { vX = -config.speed; player.style.transform = 'scaleX(-1)'; }, () => vX = 0);
        setupBtn('rBtn', () => { vX = config.speed; player.style.transform = 'scaleX(1)'; }, () => vX = 0);
        setupBtn('jBtn', () => { if(isGrounded) { vY = config.jump; isGrounded = false; } }, () => {});

        function startFinalScene() {
            won = true; vX = 0; vY = 0;
            document.getElementById('controls').style.opacity = '0';
            
            // 1. SNAP CAMERA DIRECTLY TO MO (No more relative offsets)
            const centerX = -(4200 - window.innerWidth / 2 + 20);
            world.style.transition = "transform 3s ease-in-out";
            world.style.transform = `translateX(${centerX}px) scale(1.8)`;

            // 2. FLOAT UPWARDS TOGETHER
            setTimeout(() => {
                player.style.transition = mo.style.transition = "all 5s ease-in-out";
                player.style.top = mo.style.top = "20vh"; 
                player.style.left = "4180px"; 
                mo.style.left = "4210px";
                overlay.style.background = "rgba(10, 0, 20, 0.7)";
            }, 500);

            setTimeout(() => { msg.style.opacity = '1'; }, 3500);
            setTimeout(() => window.location.href = "index.html", 8000);
        }

        function update() {
            if(!won) {
                pX += vX; vY += config.gravity; pY += vY;
                if(pX < 0) pX = 0; if(pX > 4450) pX = 4450;
                if(pY > window.innerHeight + 100) { pX = 100; pY = 400; vY = 0; }

                isGrounded = false;
                platforms.forEach(p => {
                    let pTop = window.innerHeight - p.y - 20 - config.charH;
                    if(vY >= 0 && pX + 30 > p.x && pX < p.x + p.w - 10 && pY >= pTop - 15 && pY <= pTop + 15) {
                        pY = pTop; vY = 0; isGrounded = true;
                    }
                });

                // Spikes reset to last safe spot (rough reset)
                document.querySelectorAll('.spike').forEach(s => {
                    const sR = s.getBoundingClientRect(); const pR = player.getBoundingClientRect();
                    if(!(pR.right < sR.left || pR.left > sR.right || pR.bottom < sR.top || pR.top > sR.bottom)) {
                        pX = 100; pY = 400; 
                    }
                });

                // CENTER CAMERA ON PLAYER
                let camX = -(pX - window.innerWidth / 2); // Change to /2 for perfect center
                if(camX > 0) camX = 0;
                if(camX < -(4500 - window.innerWidth)) camX = -(4500 - window.innerWidth);
                world.style.transform = `translateX(${camX}px)`;

                player.style.left = pX + 'px'; player.style.top = pY + 'px';
                if(Math.abs(pX - 4150) < 50 && isGrounded) startFinalScene();
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
