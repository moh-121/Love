<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya: Combat Medic ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: sans-serif; height: 100vh; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #0a001a; }
        #world { position: absolute; width: 5000px; height: 100%; will-change: transform; z-index: 10; }
        #stars { position: absolute; width: 6000px; height: 100%; background: radial-gradient(circle, #fff 1px, transparent 1px) 0 0 / 80px 80px; opacity: 0.15; }

        /* HUD */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 500; }
        .heart-row { display: flex; gap: 5px; font-size: 24px; margin-bottom: 5px; }
        .bar-bg { width: 100px; height: 8px; background: rgba(255,255,255,0.1); border: 1px solid #fff; border-radius: 4px; overflow: hidden; }
        #dash-bar { width: 100%; height: 100%; background: #00d4ff; transition: width 0.1s; }

        /* Haya & Needle */
        .char { position: absolute; width: 45px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .haya-body { width: 38px; height: 48px; background: #fff; border-radius: 12px 12px 2px 2px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .cross { color: #ff4d6d; font-size: 14px; position: absolute; top: 20px; left: 13px; font-weight: 900; }
        
        /* The Needle Slash Effect */
        #needle-slash { 
            position: absolute; width: 60px; height: 4px; background: #e0e0e0; 
            right: -50px; top: 25px; border-radius: 2px; opacity: 0;
            box-shadow: 0 0 10px #00d4ff; pointer-events: none;
            transform-origin: left center; transition: 0.1s;
        }
        .slashing { animation: slashAnim 0.2s ease-out; opacity: 1 !important; }
        @keyframes slashAnim {
            0% { transform: rotate(-45deg) scaleX(0); opacity: 1; }
            50% { transform: rotate(0deg) scaleX(1.5); opacity: 1; }
            100% { transform: rotate(45deg) scaleX(1); opacity: 0; }
        }

        /* Enemies */
        .enemy { position: absolute; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 20; border-radius: 50%; }
        .germ { background: #8e44ad; border-bottom: 6px solid #4a235a; }
        .virus { background: #27ae60; border: 3px solid #2ecc71; animation: floatY 2s infinite ease-in-out; }
        @keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Environment */
        .platform { position: absolute; background: #ff758c; border-top: 4px solid #ffafbd; border-bottom: 12px solid #a30026; border-radius: 6px; }
        .spike { position: absolute; width: 36px; height: 26px; background: #555; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .poof { position: absolute; width: 40px; height: 40px; background: white; border-radius: 50%; animation: explode 0.3s forwards; }
        @keyframes explode { to { transform: scale(3); opacity: 0; } }

        /* Buttons */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 1000; }
        .btn-group { display: flex; gap: 10px; align-items: flex-end; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; backdrop-filter: blur(5px); }
        .atk-btn { background: #e0e0e0; color: #333; font-size: 32px; width: 85px; height: 85px; border: none; box-shadow: 0 6px #999; }
        .jump-btn { width: 100px; height: 100px; background: #ff4d6d; border: none; box-shadow: 0 8px #a30026; font-weight: bold; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2000; display: flex; align-items: center; justify-content: center; transition: 2s; }
        .love-msg { font-family: 'Caveat', cursive; font-size: 55px; color: white; opacity: 0; text-shadow: 0 0 20px #ff4d6d; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div class="heart-row" id="hearts">❤️ ❤️ ❤️</div>
            <div class="bar-bg"><div id="dash-bar"></div></div>
        </div>

        <div id="stars"></div>
        <div id="world">
            <div id="player" class="char">
                <div id="haya-inner" class="haya-body">
                    <div class="cross">✚</div>
                    <div id="needle-slash"></div>
                </div>
            </div>
            
            <div id="mohammed" class="char" style="left: 4600px; bottom: 150px;">
                <div class="haya-body" style="background:#1a1a1a; border-top:15px solid #3d2b1f;"></div>
            </div>

            <div id="platforms-layer"></div>
            <div id="enemy-layer"></div>
        </div>

        <div id="controls">
            <div class="btn-group"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
            <div class="btn-group">
                <div class="btn atk-btn" id="aBtn">💉</div>
                <div class="btn" id="dBtn" style="background:#00d4ff; border:none; box-shadow:0 6px #0089a7; font-size: 24px;">⚡</div>
                <div class="btn jump-btn" id="jBtn">JUMP</div>
            </div>
        </div>
    </div>
    <div id="overlay"><div class="love-msg" id="msg">Mission Accomplished ❤️</div></div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const needleSlash = document.getElementById('needle-slash');
        const dashBar = document.getElementById('dash-bar');

        let pX = 150, pY = 400, vX = 0, vY = 0;
        let health = 3, jumps = 0, isInvincible = false;
        let dashReady = true, isDashing = false, isAttacking = false, camX = 0;

        const config = { gravity: 1.1, jump: -22, speed: 8.5, friction: 0.82, dashPower: 26 };

        const platforms = [
            {x: 0, y: 150, w: 600}, {x: 750, y: 250, w: 300}, {x: 1200, y: 400, w: 200},
            {x: 1550, y: 200, w: 500}, {x: 2200, y: 450, w: 250}, {x: 2600, y: 300, w: 400},
            {x: 3150, y: 500, w: 200}, {x: 3500, y: 350, w: 300}, {x: 4000, y: 150, w: 1000}
        ];

        let enemyData = [
            {x: 850, y: 290, type: 0, range: 100, startX: 850, dir: 1, speed: 3},
            {x: 1300, y: 450, type: 1, range: 80, startY: 450, dir: 1, speed: 2},
            {x: 2650, y: 340, type: 0, range: 120, startX: 2650, dir: 1, speed: 4},
            {x: 2850, y: 340, type: 0, range: 120, startX: 2850, dir: -1, speed: 4},
            {x: 3850, y: 450, type: 1, range: 150, startY: 450, dir: 1, speed: 5}
        ];

        platforms.forEach(p => {
            const d = document.createElement('div'); d.className = 'platform';
            Object.assign(d.style, {left:p.x+'px', bottom:p.y+'px', width:p.w+'px', height:'40px'});
            document.getElementById('platforms-layer').appendChild(d);
        });

        enemyData.forEach((en, i) => {
            const d = document.createElement('div');
            d.className = `enemy ${en.type === 0 ? 'germ' : 'virus'}`;
            d.id = 'en-'+i; d.innerHTML = en.type === 0 ? '😠' : '🦠';
            document.getElementById('enemy-layer').appendChild(d);
        });

        const keys = { left: false, right: false };
        const bind = (id, start, end) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
            if(end) el.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };

        bind('lBtn', () => keys.left = true, () => keys.left = false);
        bind('rBtn', () => keys.right = true, () => keys.right = false);
        bind('jBtn', () => { if(jumps < 2) { vY = config.jump; jumps++; } });
        bind('dBtn', () => {
            if(dashReady && !isDashing) {
                isDashing = true; dashReady = false;
                vX = (keys.left ? -1 : 1) * config.dashPower;
                dashBar.style.width = "0%";
                setTimeout(() => isDashing = false, 200);
                setTimeout(() => { dashReady = true; dashBar.style.width = "100%"; }, 1200);
            }
        });

        // ATTACK LOGIC
        bind('aBtn', () => {
            if(isAttacking) return;
            isAttacking = true;
            needleSlash.classList.add('slashing');
            
            // Lunge forward slightly
            vX = (vX >= 0 ? 1 : -1) * 12;

            // Check for hits
            enemyData.forEach((en, i) => {
                if(en.dead) return;
                // Calculate distance between player and enemy
                const dx = (pX + 22) - en.x;
                const dy = (pY + 30) - en.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // If enemy is in front of player and close enough
                if(dist < 90) {
                    en.dead = true;
                    document.getElementById('en-'+i).style.display = 'none';
                    spawnPoof(en.x, en.y);
                }
            });

            setTimeout(() => {
                isAttacking = false;
                needleSlash.classList.remove('slashing');
            }, 300);
        });

        function update() {
            if(pX > 4500) { win(); return; }

            if(!isDashing) {
                if(keys.left) vX = -config.speed;
                else if(keys.right) vX = config.speed;
                else vX *= config.friction;
            }
            vY += config.gravity; pX += vX; pY -= vY;

            platforms.forEach(p => {
                if (pX + 30 > p.x && pX + 10 < p.x + p.w) {
                    let top = p.y + 40;
                    if (vY > 0 && pY <= top && pY > top - 30) { pY = top; vY = 0; jumps = 0; }
                }
            });

            enemyData.forEach((en, i) => {
                if(en.dead) return;
                const el = document.getElementById('en-'+i);
                if(en.type === 0) {
                    en.x += en.dir * en.speed;
                    if(Math.abs(en.x - en.startX) > en.range) en.dir *= -1;
                } else {
                    en.y += en.dir * en.speed;
                    if(Math.abs(en.y - en.startY) > en.range) en.dir *= -1;
                }
                el.style.left = en.x + 'px'; el.style.bottom = en.y + 'px';
                
                if(checkHit(player, el)) {
                    if(vY > 0 && pY > en.y + 15) { // Stomp
                        spawnPoof(en.x, en.y);
                        en.dead = true; el.style.display = 'none';
                        vY = -18;
                    } else if(!isInvincible) {
                        takeDamage();
                    }
                }
            });

            if(pY < -100) reset();
            if(pX < 0) pX = 0;

            camX += (-(pX - window.innerWidth/2) - camX) * 0.1;
            if(camX > 0) camX = 0;
            world.style.transform = `translateX(${camX}px)`;
            
            player.style.left = pX + 'px'; player.style.bottom = pY + 'px';
            player.style.transform = `scaleX(${vX < -0.1 ? -1 : 1})`;

            requestAnimationFrame(update);
        }

        function checkHit(a, b) {
            const r1 = a.getBoundingClientRect(), r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left+10 || r1.left > r2.right-10 || r1.bottom < r2.top+10 || r1.top > r2.bottom-10);
        }

        function takeDamage() {
            health--; isInvincible = true;
            document.getElementById('haya-inner').style.opacity = "0.5";
            vY = -12; vX = (vX > 0) ? -12 : 12;
            document.getElementById('hearts').innerHTML = "❤️ ".repeat(health);
            if(health <= 0) reset();
            else setTimeout(() => { isInvincible = false; document.getElementById('haya-inner').style.opacity = "1"; }, 1000);
        }

        function spawnPoof(x, y) {
            const p = document.createElement('div'); p.className = 'poof';
            p.style.left = x + 'px'; p.style.bottom = y + 'px';
            world.appendChild(p);
            setTimeout(() => p.remove(), 300);
        }

        function reset() {
            health = 3; pX = 150; pY = 400; vX = 0; vY = 0;
            document.getElementById('hearts').innerHTML = "❤️ ❤️ ❤️";
            enemyData.forEach((en, i) => { en.dead = false; document.getElementById('en-'+i).style.display = 'flex'; });
        }

        function win() {
            document.getElementById('overlay').style.background = "rgba(0,0,0,0.8)";
            document.getElementById('msg').style.opacity = 1;
            setTimeout(() => window.location.href="index.html", 5000);
        }

        update();
    </script>
</body>
</html>
