<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nurse Haya: Clinical Strike</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: sans-serif; height: 100vh; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: radial-gradient(circle, #1a0033 0%, #05000a 100%); }
        #world { position: absolute; width: 5000px; height: 100%; will-change: transform; z-index: 10; }

        /* HUD */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .dash-outer { width: 120px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; border: 1px solid cyan; }
        #dash-bar { width: 100%; height: 100%; background: cyan; box-shadow: 0 0 8px cyan; transition: width 0.1s; }

        /* --- NURSE CHARACTER DESIGN --- */
        .char { position: absolute; width: 60px; height: 90px; display: flex; align-items: flex-end; justify-content: center; z-index: 100; transform-origin: bottom center; }
        
        #haya-visual { 
            position: relative; width: 44px; height: 85px; transform-origin: bottom center; 
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        /* The Nursing Cap */
        .cap { position: absolute; width: 20px; height: 10px; background: #fff; top: -8px; left: 10px; border-radius: 4px 4px 0 0; border: 1px solid #ddd; z-index: 15; }
        .cap::after { content: '+'; color: #ff4d6d; position: absolute; font-size: 10px; font-weight: 900; top: -2px; left: 6px; }

        .head { position: absolute; width: 30px; height: 30px; background: #ffdbac; border-radius: 50%; top: 0; left: 5px; z-index: 10; border: 1px solid #d4a373; }
        .hair { position: absolute; width: 36px; height: 20px; background: #3d2b1f; border-radius: 15px 15px 5px 5px; top: -3px; left: -3px; }
        
        /* Nurse Uniform */
        .torso { position: absolute; width: 36px; height: 42px; background: #fff; border-radius: 6px; top: 28px; left: 2px; z-index: 5; border: 1.5px solid #eee; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .nurse-cross { color: #ff4d6d; font-size: 16px; position: absolute; top: 12px; left: 10px; font-weight: 900; }
        
        .arm { position: absolute; width: 9px; height: 32px; background: #fff; border-radius: 5px; top: 30px; transform-origin: top center; z-index: 4; border-bottom: 5px solid #ffdbac; }
        .arm-l { left: -4px; } .arm-r { right: -4px; }
        .leg { position: absolute; width: 11px; height: 22px; background: #fff; border-radius: 0 0 4px 4px; top: 65px; transform-origin: top center; z-index: 4; border-bottom: 6px solid #111; }
        .leg-l { left: 6px; } .leg-r { left: 24px; }

        /* --- SMOOTH ANIMATION STATES --- */
        .walking .leg-l { animation: step 0.25s infinite alternate ease-in-out; }
        .walking .leg-r { animation: step 0.25s infinite alternate-reverse ease-in-out; }
        .walking .arm-l { animation: step 0.25s infinite alternate-reverse ease-in-out; }
        .walking .arm-r { animation: step 0.25s infinite alternate ease-in-out; }

        @keyframes step { from { transform: rotate(-25deg); } to { transform: rotate(25deg); } }

        /* Squash & Stretch Classes */
        .jump-up { transform: scale(0.85, 1.25); }
        .land-down { transform: scale(1.3, 0.7); }
        .dash-stretch { transform: scale(1.5, 0.6); }

        /* Syringe Slash */
        #slash-arc {
            position: absolute; width: 130px; height: 130px;
            border: 12px solid transparent; border-right-color: cyan;
            border-radius: 50%; top: -10px; right: -80px;
            opacity: 0; pointer-events: none; filter: drop-shadow(0 0 8px cyan);
        }
        .active-slash { animation: slashAnime 0.25s ease-out forwards; }
        @keyframes slashAnime { 0% { opacity: 1; transform: rotate(-100deg) scale(0.5); } 100% { opacity: 0; transform: rotate(80deg) scale(1.3); } }

        .ghost { position: absolute; opacity: 0.3; pointer-events: none; filter: brightness(2) cyan; animation: fadeOut 0.3s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.7); } }

        /* WORLD */
        .platform { position: absolute; background: #ff4d6d; border-radius: 8px; box-shadow: 0 8px 0 #a30026; z-index: 20; }
        .shockwave { position: absolute; width: 10px; height: 5px; background: white; border-radius: 50%; animation: shock 0.3s forwards; opacity: 0.6; }
        @keyframes shock { to { width: 120px; height: 15px; opacity: 0; } }

        /* CONTROLS */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 2000; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; backdrop-filter: blur(8px); }
        .atk-btn { background: #fff; color: #000; width: 90px; height: 90px; border: none; box-shadow: 0 0 15px cyan; }
        .jump-btn { width: 100px; height: 100px; background: #ff4d6d; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud"><div class="dash-outer"><div id="dash-bar"></div></div></div>

    <div id="world">
        <div id="player" class="char">
            <div id="haya-visual">
                <div class="cap"></div>
                <div class="arm arm-l"></div>
                <div class="leg leg-l"></div>
                <div class="torso"><div class="nurse-cross">✚</div></div>
                <div class="head">
                    <div class="hair"></div>
                    <div class="eye eye-l"></div>
                    <div class="eye eye-r"></div>
                </div>
                <div class="leg leg-r"></div>
                <div class="arm arm-r"></div>
                <div id="slash-arc"></div>
            </div>
        </div>
        <div id="platforms-layer"></div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:12px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
        <div style="display:flex; gap:12px; align-items: flex-end;">
            <div class="btn atk-btn" id="aBtn">💉</div>
            <div class="btn" id="dBtn" style="background:cyan; border:none; color:#000;">⚡</div>
            <div class="btn jump-btn" id="jBtn">JUMP</div>
        </div>
    </div>
</div>

<script>
    const world = document.getElementById('world'), player = document.getElementById('player');
    const visual = document.getElementById('haya-visual'), slash = document.getElementById('slash-arc');
    const dashBar = document.getElementById('dash-bar');

    let pX = 150, pY = 400, vX = 0, vY = 0;
    let jumpCount = 0, dashReady = true, isDashing = false, isGrounded = false;
    
    // ADJUSTED CONFIG: Dash is tighter (24 instead of 35), Double Jump enabled
    const config = { gravity: 1.0, jump: -20, speed: 6.8, friction: 0.8, dashPower: 24 };

    const platforms = [
        {x: 0, y: 100, w: 800}, {x: 950, y: 250, w: 400}, {x: 1450, y: 400, w: 350},
        {x: 1900, y: 250, w: 600}, {x: 2600, y: 400, w: 500}, {x: 3200, y: 200, w: 1000}
    ];

    platforms.forEach(p => {
        const d = document.createElement('div'); d.className = 'platform';
        Object.assign(d.style, {left:p.x+'px', bottom:p.y+'px', width:p.w+'px', height:'40px'});
        document.getElementById('platforms-layer').appendChild(d);
    });

    const setup = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };

    const keys = { l: false, r: false };
    setup('lBtn', () => keys.l = true, () => keys.l = false);
    setup('rBtn', () => keys.r = true, () => keys.r = false);
    
    // DOUBLE JUMP LOGIC
    setup('jBtn', () => { 
        if(jumpCount < 2) { 
            vY = config.jump; 
            jumpCount++; 
            visual.className = ""; // Reset anim
            void visual.offsetWidth; // Trigger reflow
            visual.classList.add('jump-up'); 
        } 
    });

    setup('aBtn', () => {
        slash.classList.add('active-slash');
        setTimeout(() => slash.classList.remove('active-slash'), 250);
    });

    setup('dBtn', () => {
        if(dashReady) {
            isDashing = true; dashReady = false;
            vX = (player.style.transform.includes('-1') ? -1 : 1) * config.dashPower;
            vY = 0;
            visual.classList.add('dash-stretch');
            dashBar.style.width = "0%";
            
            let trail = setInterval(() => {
                const g = player.cloneNode(true); g.className = 'ghost'; g.id="";
                world.appendChild(g); setTimeout(() => g.remove(), 300);
            }, 50);

            setTimeout(() => { 
                isDashing = false; 
                visual.classList.remove('dash-stretch');
                clearInterval(trail);
            }, 250);
            setTimeout(() => { dashReady = true; dashBar.style.width = "100%"; }, 1000);
        }
    });

    function update() {
        if(!isDashing) {
            vX = keys.l ? -config.speed : (keys.r ? config.speed : vX * config.friction);
            vY += config.gravity;
        }
        pX += vX; pY -= vY;

        let onGround = false;
        platforms.forEach(p => {
            if (pX + 35 > p.x && pX < p.x + p.w) {
                if (vY > 0 && pY <= p.y + 40 && pY > p.y) {
                    if(!isGrounded) { 
                        createShockwave(pX, p.y + 40);
                        visual.classList.add('land-down');
                        setTimeout(() => visual.classList.remove('land-down'), 200);
                    }
                    pY = p.y + 40; vY = 0; jumpCount = 0; onGround = true;
                }
            }
        });
        isGrounded = onGround;

        if(Math.abs(vX) > 1 && isGrounded) player.classList.add('walking');
        else player.classList.remove('walking');

        if(vX > 0.1) player.style.transform = "scaleX(1)";
        else if(vX < -0.1) player.style.transform = "scaleX(-1)";

        world.style.transform = `translateX(${-(pX - window.innerWidth/2)}px)`;
        player.style.left = pX + 'px'; player.style.bottom = pY + 'px';

        if(pY < -100) { pX = 150; pY = 400; vY = 0; }
        requestAnimationFrame(update);
    }

    function createShockwave(x, y) {
        const s = document.createElement('div'); s.className = 'shockwave';
        s.style.left = (x - 30) + 'px'; s.style.bottom = y + 'px';
        world.appendChild(s); setTimeout(() => s.remove(), 300);
    }

    update();
</script>
</body>
</html>
