<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rescue Mohammed! ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: sans-serif; height: 100vh; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 5000px; height: 100%; background: linear-gradient(to bottom, #0f001a 0%, #2b0000 100%); will-change: transform; }

        /* CHARACTERS */
        .char { position: absolute; width: 45px; height: 60px; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        
        .haya-body { width: 38px; height: 48px; background: #fff; border-radius: 12px 12px 2px 2px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .stethoscope { position: absolute; width: 22px; height: 20px; border: 2.5px solid #333; border-radius: 50%; top: 4px; left: 8px; border-top-color: transparent; }
        .cross { color: #ff4d6d; font-size: 14px; position: absolute; top: 20px; left: 13px; font-weight: 900; }
        
        .mo-body { width: 42px; height: 52px; background: #1a1a1a; border-radius: 10px 10px 2px 2px; position: relative; border-top: 18px solid #3d2b1f; }
        .mo-shirt { position: absolute; width: 14px; height: 22px; background: #34495e; top: 0px; left: 14px; border-radius: 2px; }

        .feet-container { display: flex; justify-content: space-between; width: 30px; height: 8px; margin-top: -2px; }
        .foot { width: 12px; height: 8px; background: #111; border-radius: 2px; }

        /* SOLID PLATFORMS */
        .platform { position: absolute; background: #ff758c; border-top: 5px solid #ffafbd; border-bottom: 10px solid #a30026; z-index: 10; border-radius: 4px; }
        .spike { position: absolute; width: 40px; height: 30px; background: #7f8c8d; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); z-index: 5; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: background 2s; }
        .love-msg { font-family: 'Caveat', cursive; font-size: 45px; color: white; opacity: 0; text-shadow: 0 0 20px #ff4d6d; text-align: center; transition: 2s; }
        
        #controls { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 200; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 2px solid white; color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="world">
            <div id="player" class="char">
                <div class="haya-body"><div class="stethoscope"></div><div class="cross">✚</div></div>
                <div class="feet-container"><div class="foot"></div><div class="foot"></div></div>
            </div>

            <div id="mohammed" class="char" style="left: 4200px; bottom: 150px;">
                <div class="mo-body"><div class="mo-shirt"></div><div style="width:100%;text-align:center;color:white;position:absolute;top:0;font-weight:bold;font-size:10px;">^ _ ^</div></div>
                <div class="feet-container"><div class="foot"></div><div class="foot"></div></div>
            </div>
            <div id="platforms-layer"></div>
            <div id="spikes-layer"></div>
        </div>

        <div id="controls">
            <div style="display:flex; gap:15px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
            <div class="btn" id="jBtn" style="width:110px; border-radius:30px; background:#ff4d6d; font-weight:bold;">JUMP</div>
        </div>
    </div>
    <div id="overlay"><div class="love-msg" id="msg">You Rescued My Heart ❤️</div></div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const mo = document.getElementById('mohammed');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');

        // Physics variables - pY is now the bottom of the feet
        let pX = 100, pY = 400, vX = 0, vY = 0, isGrounded = false, won = false;
        const config = { gravity: 1.0, jump: -22, speed: 8.5, charW: 45, charH: 60 };

        const platforms = [
            {x: 0, y: 150, w: 600}, {x: 750, y: 280, w: 200}, {x: 1050, y: 400, w: 150},
            {x: 1300, y: 250, w: 250}, {x: 1700, y: 420, w: 180}, {x: 2000, y: 300, w: 300},
            {x: 2450, y: 450, w: 200}, {x: 2800, y: 350, w: 250}, {x: 3150, y: 500, w: 150},
            {x: 3500, y: 320, w: 250}, {x: 3900, y: 150, w: 800} // Final Platform
        ];

        const spikes = [{x: 1400, y: 250}, {x: 2100, y: 300}, {x: 4000, y: 150}, {x: 4100, y: 150}];

        platforms.forEach(p => {
            const d = document.createElement('div'); d.className = 'platform';
            d.style.left = p.x + 'px'; 
            d.style.bottom = p.y + 'px'; 
            d.style.width = p.w + 'px'; 
            d.style.height = '40px'; // Thicker visual platforms
            document.getElementById('platforms-layer').appendChild(d);
        });

        spikes.forEach(s => {
            const d = document.createElement('div'); d.className = 'spike';
            d.style.left = s.x + 'px'; d.style.bottom = (s.y + 35) + 'px'; // Sit on top of platform
            document.getElementById('spikes-layer').appendChild(d);
        });

        const setupBtn = (id, start, end) => {
            const b = document.getElementById(id);
            b.addEventListener('touchstart', (e) => { e.preventDefault(); if(!won) start(); });
            b.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };

        setupBtn('lBtn', () => { vX = -config.speed; player.style.transform = 'scaleX(-1)'; }, () => vX = 0);
        setupBtn('rBtn', () => { vX = config.speed; player.style.transform = 'scaleX(1)'; }, () => vX = 0);
        setupBtn('jBtn', () => { if(isGrounded) { vY = config.jump; isGrounded = false; } }, () => {});

        function startFinalScene() {
            won = true; vX = 0; vY = 0;
            document.getElementById('controls').style.opacity = '0';
            
            // CAMERA FOLLOW OFF - STATIC VIEW OF DUO
            const finalCamX = -(4200 - window.innerWidth / 2 + 20);
            world.style.transition = "transform 2s ease-in-out";
            world.style.transform = `translateX(${finalCamX}px)`;

            setTimeout(() => {
                player.style.transition = mo.style.transition = "all 5s ease-in-out";
                player.style.bottom = mo.style.bottom = "60vh"; 
                player.style.left = "4180px"; 
                mo.style.left = "4215px";
                overlay.style.background = "rgba(10, 0, 20, 0.8)";
            }, 500);

            setTimeout(() => { msg.style.opacity = '1'; }, 3000);
            setTimeout(() => window.location.href = "index.html", 8500);
        }

        function update() {
            if(!won) {
                // Gravity & Movement
                vY += config.gravity;
                pX += vX;
                pY -= vY; // Subtracting because CSS 'bottom' works upwards

                // Floor/World bounds
                if(pX < 0) pX = 0;
                if(pX > 4900) pX = 4900;
                if(pY < -100) { pX = 100; pY = 500; vY = 0; } // Fall death

                // COLLISION LOGIC (Precise Foot-to-Platform)
                isGrounded = false;
                platforms.forEach(p => {
                    // Check if player is horizontally within platform
                    if (pX + 35 > p.x && pX + 10 < p.x + p.w) {
                        // Check if feet are hitting the top of the platform (p.y + platform height)
                        let platformTop = p.y + 40; 
                        if (vY > 0 && pY <= platformTop && pY > platformTop - 30) {
                            pY = platformTop;
                            vY = 0;
                            isGrounded = true;
                        }
                    }
                });

                // Spikes
                document.querySelectorAll('.spike').forEach(s => {
                    const sR = s.getBoundingClientRect(); const pR = player.getBoundingClientRect();
                    if(!(pR.right < sR.left + 5 || pR.left > sR.right - 5 || pR.bottom < sR.top || pR.top > sR.bottom)) {
                        pX = 100; pY = 500; vY = 0;
                    }
                });

                // TRUE CAMERA FOLLOW (Nurse always centered)
                let camX = -(pX - window.innerWidth / 2 + 22);
                if(camX > 0) camX = 0;
                if(camX < -(5000 - window.innerWidth)) camX = -(5000 - window.innerWidth);
                world.style.transform = `translateX(${camX}px)`;

                // Update Visual Position
                player.style.left = pX + 'px';
                player.style.bottom = pY + 'px';

                if(Math.abs(pX - 4150) < 50 && isGrounded) startFinalScene();
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
