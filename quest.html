<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Haya: Clinical Vanguard</title>
    <style>
        :root { --cyan: #00f2ff; --red: #ff0055; --dark: #05020a; --white: #ffffff; }
        body { margin: 0; background: var(--dark); overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }

        #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; perspective: 1000px; }
        #world { position: absolute; will-change: transform; transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

        /* --- CHARACTER DESIGN: HAYA --- */
        #haya { 
            position: absolute; width: 60px; height: 90px; 
            z-index: 1000; transform-origin: bottom center;
        }

        /* Skeletal Parts */
        .h-part { position: absolute; background-size: contain; transition: transform 0.2s; }
        
        .h-head { width: 34px; height: 34px; background: #ffe0bd; border-radius: 50%; top: -35px; left: 13px; z-index: 5; }
        .h-hair { position: absolute; width: 44px; height: 32px; background: #2d1b10; border-radius: 20px 20px 5px 15px; top: -5px; left: -5px; animation: hairFloat 2s infinite ease-in-out; }
        
        .h-coat { width: 40px; height: 55px; background: var(--white); border-radius: 8px 8px 18px 18px; top: 0; left: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-bottom: 4px solid #ddd; }
        .h-cross { position: absolute; color: var(--red); font-weight: bold; font-size: 12px; right: 6px; top: 6px; }

        .h-arm { width: 10px; height: 35px; background: var(--white); border-radius: 5px; top: 5px; transform-origin: top center; z-index: 6; }
        .h-arm.front { right: -5px; }
        .h-syringe { position: absolute; width: 6px; height: 45px; background: var(--cyan); bottom: -35px; left: 2px; box-shadow: 0 0 20px var(--cyan); border-radius: 2px; }

        .h-leg { width: 12px; height: 30px; background: var(--white); top: 50px; border-bottom: 8px solid #111; z-index: 1; }

        /* --- ANIMATIONS --- */
        @keyframes hairFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        
        /* Idle state */
        .idle .h-coat { animation: breath 3s infinite ease-in-out; }
        @keyframes breath { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.03); } }

        /* Running state */
        .running .h-leg.l { animation: legSwing 0.4s infinite alternate; }
        .running .h-leg.r { animation: legSwing 0.4s infinite alternate-reverse; }
        .running .h-arm.front { animation: armSwing 0.4s infinite alternate; }
        @keyframes legSwing { from { transform: rotate(-30deg); } to { transform: rotate(30deg); } }
        @keyframes armSwing { from { transform: rotate(-20deg); } to { transform: rotate(20deg); } }

        /* Attack state */
        .attacking .h-arm.front { transform: rotate(150deg) scale(1.2) !important; transition: transform 0.1s cubic-bezier(0.18, 0.89, 0.32, 1.28); }

        /* --- ENVIRONMENT --- */
        .platform { position: absolute; background: linear-gradient(180deg, #1e1133 0%, #0a0515 100%); border-top: 4px solid var(--cyan); border-radius: 4px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--cyan) 1px, transparent 1px), linear-gradient(90deg, var(--cyan) 1px, transparent 1px); background-size: 100px 100px; opacity: 0.05; pointer-events: none; }

        /* --- UI --- */
        #hud { position: fixed; top: 40px; left: 40px; z-index: 10000; }
        .vitals { font-size: 10px; letter-spacing: 3px; margin-bottom: 10px; opacity: 0.7; }
        .hp-bar { width: 250px; height: 4px; background: rgba(255,255,255,0.1); position: relative; }
        .hp-fill { width: 100%; height: 100%; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div id="stage">
    <div id="hud">
        <div class="vitals">OPERATOR: HAYA // STATUS: ACTIVE</div>
        <div class="hp-bar"><div class="hp-fill"></div></div>
    </div>

    <div id="world">
        <div id="haya" class="idle">
            <div class="h-part h-head"><div class="h-hair"></div></div>
            <div class="h-part h-coat"><div class="h-cross">✚</div></div>
            <div class="h-part h-arm front"><div class="h-syringe"></div></div>
            <div class="h-part h-leg l" style="left: 12px;"></div>
            <div class="h-part h-leg r" style="left: 28px;"></div>
        </div>
        <div id="objects"></div>
    </div>
</div>

<script>
    const world = document.getElementById('world'), haya = document.getElementById('haya');
    
    // Quality of Life Variables
    let pX = 200, pY = 400, vX = 0, vY = 0;
    let camX = 0, isAttacking = false;
    let coyoteCounter = 0; // Allows jumping for a few frames after leaving a platform

    const config = {
        gravity: 0.8,
        friction: 0.82,
        accel: 1.5,
        jump: -17,
        coyoteMax: 10
    };

    const keys = {};

    // Map Build (High Detail Layout)
    const map = [
        {x: 0, y: 600, w: 1200},
        {x: 1300, y: 450, w: 400},
        {x: 1800, y: 300, w: 400},
        {x: 2300, y: 500, w: 1000}
    ];

    map.forEach(p => {
        const d = document.createElement('div');
        d.className = 'platform';
        Object.assign(d.style, { left: p.x+'px', top: p.y+'px', width: p.w+'px', height: '100px' });
        document.getElementById('objects').appendChild(d);
    });

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    window.onmousedown = () => {
        if(!isAttacking) {
            isAttacking = true;
            haya.classList.add('attacking');
            setTimeout(() => {
                isAttacking = false;
                haya.classList.remove('attacking');
            }, 300);
        }
    };

    function update() {
        // Horizontal Movement
        if (keys['KeyA'] || keys['ArrowLeft']) vX -= config.accel;
        if (keys['KeyD'] || keys['ArrowRight']) vX += config.accel;
        vX *= config.friction;

        // Vertical Movement
        vY += config.gravity;
        pX += vX; pY += vY;

        // Collision & Coyote Time
        let grounded = false;
        map.forEach(p => {
            if (pX + 40 > p.x && pX < p.x + p.w) {
                if (vY > 0 && pY + 85 >= p.y && pY + 85 <= p.y + 50) {
                    pY = p.y - 85;
                    vY = 0;
                    grounded = true;
                }
            }
        });

        if (grounded) coyoteCounter = config.coyoteMax;
        else coyoteCounter--;

        // Jump Logic (Space / W)
        if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && coyoteCounter > 0) {
            vY = config.jump;
            coyoteCounter = 0;
        }

        // --- VISUAL FEEDBACK (THE "ALIVE" PART) ---
        // Animation States
        if (Math.abs(vX) > 1 && grounded) {
            haya.className = 'running';
        } else if (!grounded) {
            haya.className = 'jumping';
        } else {
            haya.className = 'idle';
        }
        if (isAttacking) haya.classList.add('attacking');

        // Sprite Flip
        let dir = 1;
        if (vX < -0.5) dir = -1;
        else if (vX > 0.5) dir = 1;

        // Transform Player
        haya.style.transform = `translate3d(${pX}px, ${pY}px, 0) scaleX(${dir})`;

        // Smooth Camera Follow
        const targetCam = -(pX - window.innerWidth / 2.5);
        camX += (targetCam - camX) * 0.08;
        world.style.transform = `translateX(${camX}px)`;

        // Fall Safety
        if (pY > 1200) { pX = 200; pY = 400; vX = 0; vY = 0; }

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
