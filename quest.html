<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Haya: Sector 7 Protocol</title>
    <style>
        :root { --cyan: #00f2ff; --red: #ff0055; --bg: #030109; --panel: rgba(10, 5, 25, 0.9); }
        * { box-sizing: border-box; cursor: crosshair; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }

        /* --- THE VIEWPORT --- */
        #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* Deep Background Parallax */
        #bg-deep { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #030109 100%); z-index: 1; }
        .far-structure { position: absolute; bottom: 0; width: 300%; height: 300px; background: linear-gradient(0deg, #10061f 0%, transparent 100%); opacity: 0.3; clip-path: polygon(0% 100%, 10% 50%, 20% 70%, 30% 40%, 40% 60%, 50% 20%, 60% 50%, 70% 30%, 80% 60%, 90% 40%, 100% 100%); }
        
        #world { position: absolute; width: 100%; height: 100%; will-change: transform; z-index: 10; }

        /* --- REDESIGNED HAYA MODEL (Polished Rig) --- */
        .player { position: absolute; width: 60px; height: 100px; transform-origin: bottom center; z-index: 100; transition: transform 0.1s; }
        .visual-haya { position: relative; width: 100%; height: 100%; }
        
        /* Shaded Coat (AAA-Indie Detail) */
        .body-coat { 
            position: absolute; bottom: 10px; left: 10px; width: 40px; height: 60px; 
            background: linear-gradient(135deg, #f0f0f5 0%, #e0e0e5 100%);
            border-radius: 8px 8px 20px 20px; border: 1px solid rgba(255,255,255,0.8);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s, border-radius 0.2s;
        }
        .coat-trim { position: absolute; bottom: -2px; left: 0; width: 100%; height: 10px; background: rgba(0,0,0,0.05); border-radius: 0 0 20px 20px; }
        .nurse-cross { color: var(--red); position: absolute; font-size: 10px; top: 6px; right: 6px; font-weight: bold; opacity: 0.8; }

        /* Empty Arm (Dynamic Syringe Summon) */
        .arm-front { 
            position: absolute; top: 35px; right: -5px; width: 12px; height: 35px; 
            background: #f0f0f5; border-radius: 6px; transform-origin: top center;
            z-index: 10; box-shadow: -2px 0 5px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        
        /* The Summond Weapon (Phases in) */
        .syringe-blade { 
            position: absolute; bottom: -35px; left: 2px; width: 8px; height: 45px; 
            background: var(--cyan); border-radius: 2px;
            box-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
            opacity: 0; transform: scaleY(0); transform-origin: top;
            transition: opacity 0.1s, transform 0.1s;
        }
        /* State when attacking */
        .attacking .syringe-blade { opacity: 1; transform: scaleY(1); }

        .head { position: absolute; top: 0; left: 15px; width: 34px; height: 34px; background: #ffe0bd; border-radius: 50%; border-bottom: 2px solid #d4a373; z-index: 5; }
        .hair { position: absolute; top: -5px; left: -5px; width: 44px; height: 30px; background: #2d1b10; border-radius: 20px 20px 5px 15px; transition: transform 0.3s; }
        .hair-highlight { position: absolute; width: 15px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; top: 5px; left: 10px; transform: rotate(-5deg); }

        /* Leg Structure */
        .leg { position: absolute; width: 12px; height: 35px; background: #f0f0f5; bottom: -10px; border-bottom: 10px solid #1a1a1a; transform-origin: top center; z-index: 1; }

        /* --- VISUAL EFFECTS (JUICE) --- */
        .particle { position: absolute; pointer-events: none; border-radius: 50%; background: var(--cyan); animation: fadeOut 0.6s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-30px) scale(0); } }

        .slash-fx { 
            position: absolute; width: 150px; height: 150px; border: 5px solid var(--cyan); 
            border-radius: 50%; border-right-color: transparent; border-top-color: transparent;
            opacity: 0; pointer-events: none; filter: blur(1px) drop-shadow(0 0 10px var(--cyan));
            top: -20px; right: -70px; z-index: 1000;
        }
        .attacking .slash-fx { animation: slashBlur 0.25s ease-out; }
        @keyframes slashBlur { 0% { opacity: 1; transform: scale(0.6) rotate(-45deg); filter: brightness(2); } 100% { opacity: 0; transform: scale(1.4) rotate(135deg); filter: brightness(1); } }

        /* --- ENVIRONMENT --- */
        .plat { position: absolute; background: linear-gradient(180deg, #1e1133 0%, #0a0515 100%); border: 2px solid #3d2266; box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 2px 0 rgba(255,255,255,0.05); border-radius: 8px; }
        .enemy { position: absolute; width: 50px; height: 50px; background: var(--red); border-radius: 50%; filter: blur(4px); box-shadow: 0 0 30px var(--red); }

        /* --- UI & HUD --- */
        #hud { position: fixed; top: 30px; left: 30px; z-index: 10000; }
        .sys-log { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; margin-bottom: 10px; }
        .hp-outer { width: 300px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #hp-inner { width: 100%; height: 100%; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); transition: width 0.3s ease; }
    </style>
</head>
<body>

<div id="stage">
    <div id="bg-deep">
        <div class="far-structure"></div>
    </div>
    
    <div id="hud">
        <div class="sys-log">HAYA // Protocol v0.5 // Sector_7</div>
        <div class="hp-outer"><div id="hp-inner"></div></div>
    </div>

    <div id="world">
        <div id="player" class="player idle">
            <div class="visual-haya">
                <div class="slash-fx"></div>
                <div class="head">
                    <div class="hair"><div class="hair-highlight"></div></div>
                </div>
                <div class="body-coat">
                    <div class="nurse-cross">✚</div>
                    <div class="coat-trim"></div>
                </div>
                <div class="arm-front" id="weapon-arm">
                    <div class="syringe-blade"></div>
                </div>
                <div class="leg leg-back" style="left: 14px; z-index: 2; filter: brightness(0.7);"></div>
                <div class="leg leg-front" style="left: 26px; z-index: 8;"></div>
            </div>
        </div>
        
        <div id="platforms"></div>
        <div id="enemies"></div>
    </div>
</div>

<script>
    const stage = document.getElementById('stage'), world = document.getElementById('world'), player = document.getElementById('player');
    const arm = document.getElementById('weapon-arm');
    const bgStructures = document.querySelector('.far-structure');

    // --- GAME ENGINE STATE ---
    let pX = 200, pY = 400, vX = 0, vY = 0;
    let camX = 0, facing = 1, isAttacking = false, isGrounded = false, jumpCount = 0;
    const input = { left: false, right: false };

    // Professional Physics Configuration (Ori-style snappiness)
    const config = {
        accel: 1.4,
        friction: 0.84,
        maxSpeed: 8,
        gravity: 0.8,
        jump: -17,
        lerp: 0.1 // Camera smoothness
    };

    // --- GENERATE LEVEL ---
    const plats = [
        {x: 0, y: 150, w: 1200}, {x: 1300, y: 350, w: 600}, {x: 2000, y: 500, w: 500}, 
        {x: 2600, y: 300, w: 800}, {x: 3600, y: 550, w: 1000}
    ];

    plats.forEach(p => {
        const d = document.createElement('div'); d.className = 'plat';
        Object.assign(d.style, {left:p.x+'px', bottom:p.y+'px', width:p.w+'px', height:'40px'});
        document.getElementById('platforms').appendChild(d);
    });

    // --- PC INPUTS ---
    window.addEventListener('keydown', e => {
        if(e.code === 'KeyD' || e.code === 'ArrowRight') input.right = true;
        if(e.code === 'KeyA' || e.code === 'ArrowLeft') input.left = true;
        if(e.code === 'Space' || e.code === 'KeyW') jump();
    });
    window.addEventListener('keyup', e => {
        if(e.code === 'KeyD' || e.code === 'ArrowRight') input.right = false;
        if(e.code === 'KeyA' || e.code === 'ArrowLeft') input.left = false;
    });
    window.addEventListener('mousedown', () => attack());

    function jump() {
        if(jumpCount < 2) {
            vY = config.jump;
            jumpCount++;
            spawnParticles(pX + 30, pY);
            // Squash and stretch feedback
            player.style.transform = `translate3d(${pX}px, ${pY}px, 0) scaleX(${0.8 * facing}) scaleY(1.3)`;
            setTimeout(() => player.style.transform = `translate3d(${pX}px, ${pY}px, 0) scaleX(${facing})`, 100);
        }
    }

    function attack() {
        if(isAttacking) return;
        isAttacking = true;
        
        // Summons syringe, slashes, and causes visual impact
        player.classList.add('attacking');
        arm.style.transform = "rotate(135deg) scale(1.1)";
        document.body.style.filter = "brightness(1.5)"; // Hit-stop flash

        setTimeout(() => {
            player.classList.remove('attacking');
            arm.style.transform = "rotate(0deg) scale(1)";
            document.body.style.filter = "none";
            isAttacking = false;
        }, 220); // Syncs with the slash animation
    }

    function spawnParticles(x, y) {
        for(let i=0; i<8; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.left = x + 'px'; p.style.bottom = y + 'px';
            p.style.width = p.style.height = Math.random()*8+'px';
            world.appendChild(p); setTimeout(() => p.remove(), 600);
        }
    }

    // --- MAIN ENGINE LOOP ---
    function update() {
        // Physics logic
        if(input.left) { vX -= config.accel; facing = -1; }
        if(input.right) { vX += config.accel; facing = 1; }
        vX *= config.friction;
        
        vY += config.gravity;
        pX += vX; pY -= vY;

        // Platform Collision logic
        isGrounded = false;
        plats.forEach(p => {
            if (pX + 40 > p.x && pX < p.x + p.w && vY > 0 && pY <= p.y + 40 && pY > p.y) {
                if(vY > 10) spawnParticles(pX + 30, p.y + 40); // Hard landing FX
                pY = p.y + 40; vY = 0; jumpCount = 0; isGrounded = true;
            }
        });

        // Facing flip + procedural movement lean
        const lean = grounded ? Math.min(Math.abs(vX) * 1.5, 12) : 0;
        player.style.transform = `translate3d(${pX}px, ${pY}px, 0) scaleX(${facing}) rotate(${lean * facing}deg)`;

        // --- ANIMATION BLENDING ---
        if(Math.abs(vX) > 1 && isGrounded) player.className = 'player running';
        else if(!isGrounded) player.className = 'player jumping';
        else player.className = 'player idle';

        // Physics-based Hair & Coat lag
        document.querySelector('.hair').style.transform = `translateX(${-vX * 0.4}px) rotate(${-vX * 0.8}deg)`;
        document.querySelector('.body-coat').style.transform = `skewX(${-vX * 1.2}deg)`;

        // --- SMOOTH CAMERA & PARALLAX ---
        const targetCamX = -(pX - window.innerWidth / 2.5);
        camX += (targetCamX - camX) * config.lerp;
        
        world.style.transform = `translateX(${camX}px)`;
        // Far parallax layer moves slower
        bgStructures.style.transform = `translateX(${camX * 0.4}px)`;

        player.style.left = pX + 'px'; player.style.bottom = pY + 'px';

        // Respawn Safety
        if(pY < -200) { pX = 200; pY = 400; vX = 0; vY = 0; }

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
