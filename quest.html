<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nurse Haya's Quest ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: -apple-system, sans-serif; height: 100vh; touch-action: none; }
        
        #game-world { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #0f001a 0%, #2b0000 100%); }
        #hud { position: absolute; top: 40px; width: 100%; text-align: center; color: white; font-weight: bold; z-index: 100; font-size: 26px; letter-spacing: 2px; text-shadow: 0 0 10px #ff4d6d; }
        
        /* THE NURSE CHARACTER */
        #player { position: absolute; width: 40px; height: 55px; z-index: 50; will-change: transform, left, top; display: flex; align-items: flex-end; justify-content: center; }
        
        .char-container { width: 100%; height: 100%; position: relative; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .char-body { 
            width: 36px; height: 45px; background: #f8f9fa; border-radius: 10px 10px 4px 4px; 
            position: absolute; bottom: 8px; left: 2px; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* Stethoscope & Symbols */
        .stethoscope { position: absolute; width: 20px; height: 18px; border: 2.5px solid #444; border-radius: 50%; top: 4px; border-top-color: transparent; }
        .cross { color: #ff4d6d; font-size: 14px; margin-top: 8px; font-weight: 900; }
        .face { font-size: 14px; color: #333; margin-top: 2px; font-weight: bold; }

        .foot { width: 14px; height: 10px; background: #222; border-radius: 4px; position: absolute; bottom: 0; transition: transform 0.1s; }
        .foot-l { left: 4px; } .foot-r { right: 4px; }

        /* Animation States */
        .walking .char-container { transform: rotate(8deg); }
        .walking.facing-left .char-container { transform: rotate(-8deg); }
        .walking .foot-l { animation: walkCycle 0.2s infinite alternate; }
        .walking .foot-r { animation: walkCycle 0.2s infinite alternate-reverse; }
        @keyframes walkCycle { from { transform: translateY(0); } to { transform: translateY(-12px); } }
        
        .jumping .char-container { transform: scale(0.8, 1.2); }
        .falling .char-container { transform: scale(1.1, 0.9); }

        /* Platforms & Items */
        .ground { position: absolute; bottom: 0; width: 100%; height: 60px; background: #221100; border-top: 6px solid #ff4d6d; z-index: 10; box-shadow: 0 -10px 20px rgba(255, 77, 109, 0.2); }
        .platform { position: absolute; background: #ff758c; border-radius: 20px; border-bottom: 6px solid #a30026; z-index: 10; overflow: hidden; }
        .platform::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.3); }

        .item { position: absolute; font-size: 35px; z-index: 5; filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5)); animation: float 1.5s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.1); } }

        /* Controls */
        #controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 200; }
        .btn { width: 85px; height: 85px; background: rgba(255,255,255,0.1); border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 35px; border: 2px solid rgba(255,255,255,0.3); backdrop-filter: blur(8px); }
        .btn:active { background: rgba(255,255,255,0.3); transform: scale(0.92); }
        .heal-btn { width: 110px; background: linear-gradient(45deg, #ff4d6d, #ff758c); border: none; color: white; font-weight: 900; font-size: 20px; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3); }
    </style>
</head>
<body>

    <div id="game-world">
        <div id="hud">💖 <span id="pts">0</span> / 150</div>
        
        <div id="player">
            <div class="char-container">
                <div class="char-body">
                    <div class="stethoscope"></div>
                    <div class="cross">✚</div>
                    <div class="face">^ _ ^</div>
                </div>
                <div class="foot foot-l"></div>
                <div class="foot foot-r"></div>
            </div>
        </div>
        
        <div class="ground"></div>

        <div id="controls">
            <div style="display:flex; gap:15px;">
                <div class="btn" id="lBtn">⬅️</div>
                <div class="btn" id="rBtn">➡️</div>
            </div>
            <div class="btn heal-btn" id="jBtn">HEAL</div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const pts = document.getElementById('pts');
        const world = document.getElementById('game-world');
        
        let pX = 50, pY = 100;
        let vX = 0, vY = 0;
        let isGrounded = false;
        let score = 0;

        const config = { speed: 8, gravity: 0.9, jump: -21, charW: 40, charH: 55 };

        const platforms = [
            {x: 40, y: 200, w: 150, h: 20},
            {x: 230, y: 350, w: 140, h: 20},
            {x: 30, y: 500, w: 160, h: 20},
            {x: 210, y: 650, w: 150, h: 20}
        ];

        platforms.forEach(p => {
            const d = document.createElement('div');
            d.className = 'platform';
            d.style.left = p.x + 'px';
            d.style.bottom = p.y + 'px';
            d.style.width = p.w + 'px';
            d.style.height = p.h + 'px';
            world.appendChild(d);
        });

        // Touch Listeners
        const setupBtn = (id, start, end) => {
            const b = document.getElementById(id);
            b.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
            b.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };

        setupBtn('lBtn', () => { vX = -config.speed; player.classList.add('walking', 'facing-left'); }, () => { vX = 0; player.classList.remove('walking'); });
        setupBtn('rBtn', () => { vX = config.speed; player.classList.add('walking'); player.classList.remove('facing-left'); }, () => { vX = 0; player.classList.remove('walking'); });
        setupBtn('jBtn', () => { if(isGrounded) { vY = config.jump; isGrounded = false; player.classList.add('jumping'); } }, () => {});

        function spawn() {
            const it = document.createElement('div');
            it.className = 'item';
            const r = Math.random();
            it.innerHTML = r > 0.9 ? "🌹" : (r > 0.7 ? "⭐" : "❤️");
            it.dataset.val = r > 0.9 ? 15 : (r > 0.7 ? 5 : 1);
            it.style.left = Math.random() * 80 + 5 + "vw";
            it.style.bottom = (Math.random() * 70 + 15) + "vh";
            world.appendChild(it);
        }
        for(let i=0; i<7; i++) spawn();

        function update() {
            pX += vX;
            vY += config.gravity;
            pY += vY;

            // Animations State
            if(vY < 0) { player.classList.add('jumping'); player.classList.remove('falling'); }
            else if(vY > 2) { player.classList.remove('jumping'); player.classList.add('falling'); }

            // Wall Collisions
            if(pX < 0) pX = 0;
            if(pX > window.innerWidth - config.charW) pX = window.innerWidth - config.charW;

            // Ground/Platform Collision (Pixel-Perfect logic)
            let currentGround = window.innerHeight - 60 - config.charH;
            isGrounded = false;

            if(pY >= currentGround) {
                pY = currentGround; vY = 0; isGrounded = true;
                player.classList.remove('jumping', 'falling');
            }

            platforms.forEach(p => {
                const pTop = window.innerHeight - p.y - p.h - config.charH;
                // Check if falling onto platform
                if(vY >= 0 && pX + config.charW - 10 > p.x && pX + 10 < p.x + p.w) {
                    if(pY >= pTop && pY <= pTop + 25) { // Collision window
                        pY = pTop; vY = 0; isGrounded = true;
                        player.classList.remove('jumping', 'falling');
                    }
                }
            });

            player.style.left = pX + 'px';
            player.style.top = pY + 'px';

            // Item Pickup
            document.querySelectorAll('.item').forEach(it => {
                const b1 = player.getBoundingClientRect();
                const b2 = it.getBoundingClientRect();
                if(!(b1.right < b2.left || b1.left > b2.right || b1.bottom < b2.top || b1.top > b2.bottom)) {
                    score += parseInt(it.dataset.val);
                    pts.innerText = Math.min(score, 150);
                    it.remove(); spawn();
                    if(score >= 150) {
                        alert("Great work, Nurse Haya! ❤️ Your message is waiting...");
                        window.location.href = "index.html";
                    }
                }
            });

            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
