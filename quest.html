<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya: Medical Ace</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #080212; font-family: 'Poppins', sans-serif; height: 100vh; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: radial-gradient(circle, #1a0b2e 0%, #080212 100%); }
        #world { position: absolute; width: 5000px; height: 100%; will-change: transform; z-index: 10; }

        /* --- REDESIGNED NURSE DESIGN --- */
        .char { position: absolute; width: 50px; height: 80px; display: flex; align-items: flex-end; justify-content: center; z-index: 100; transform-origin: bottom center; }
        
        #haya-visual { 
            position: relative; width: 32px; height: 75px; transform-origin: bottom center; 
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        /* Head & Hair (Side Profile) */
        .head { position: absolute; width: 28px; height: 28px; background: #ffe0bd; border-radius: 50% 50% 40% 40%; top: 0; left: 6px; z-index: 10; }
        .hair { position: absolute; width: 34px; height: 24px; background: #2d1b10; border-radius: 18px 18px 5px 12px; top: -4px; left: -3px; }
        .hair-back { position: absolute; width: 12px; height: 20px; background: #2d1b10; border-radius: 5px; top: 10px; left: -2px; }
        .cap { position: absolute; width: 16px; height: 8px; background: #fff; top: -10px; left: 12px; border-radius: 3px; z-index: 15; transform: rotate(-15deg); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
        .cap::after { content: ''; position: absolute; width: 6px; height: 2px; background: #ff4d6d; top: 3px; left: 5px; }
        .cap::before { content: ''; position: absolute; width: 2px; height: 6px; background: #ff4d6d; top: 1px; left: 7px; }
        .eye { position: absolute; width: 5px; height: 7px; background: #111; border-radius: 50%; top: 11px; right: 5px; }

        /* Medical Coat (A-line Shape) */
        .coat { 
            position: absolute; width: 28px; height: 38px; background: #ffffff; 
            border-radius: 5px 5px 12px 12px; top: 26px; left: 4px; z-index: 5;
            border-bottom: 4px solid #f0f0f0;
        }
        .nurse-cross-side { width: 8px; height: 8px; position: absolute; top: 10px; right: 4px; background: #ff4d6d; border-radius: 1px; }

        /* Limbs (Smoother Integration) */
        .arm { position: absolute; width: 7px; height: 28px; background: #fff; border-radius: 4px; top: 28px; transform-origin: top center; }
        .arm-back { left: 4px; z-index: 2; filter: brightness(0.7); }
        .arm-front { left: 14px; z-index: 8; }
        
        /* THE SYRINGE (Weapon) */
        .syringe {
            position: absolute; width: 6px; height: 35px; background: #ddd;
            bottom: -20px; left: 0; border-radius: 2px;
            border-bottom: 8px solid cyan; box-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .leg { position: absolute; width: 9px; height: 22px; background: #fff; border-radius: 0 0 3px 3px; top: 60px; transform-origin: top center; border-bottom: 6px solid #1a1a1a; }
        .leg-back { left: 8px; z-index: 2; filter: brightness(0.7); }
        .leg-front { left: 16px; z-index: 8; }

        /* --- REFINED ANIMATIONS --- */
        .walking .leg-front { animation: legStep 0.28s infinite alternate ease-in-out; }
        .walking .leg-back { animation: legStep 0.28s infinite alternate-reverse ease-in-out; }
        .walking .arm-front { animation: armSwing 0.28s infinite alternate ease-in-out; }
        .walking .arm-back { animation: armSwing 0.28s infinite alternate-reverse ease-in-out; }

        @keyframes legStep { from { transform: rotate(-28deg); } to { transform: rotate(28deg); } }
        @keyframes armSwing { from { transform: rotate(-20deg); } to { transform: rotate(20deg); } }

        .jump-up { transform: scale(0.82, 1.25) !important; }
        .land-down { transform: scale(1.25, 0.75) !important; }

        /* DASH PHANTOM */
        .ghost { position: absolute; opacity: 0.3; pointer-events: none; filter: hue-rotate(180deg) brightness(2); animation: fade 0.3s forwards; }
        @keyframes fade { to { opacity: 0; transform: translateY(-10px) scale(0.8); } }

        /* SLASH EFFECT */
        #slash-arc {
            position: absolute; width: 140px; height: 140px;
            border: 15px solid transparent; border-right-color: rgba(0, 255, 255, 0.8);
            border-radius: 50%; top: -20px; right: -90px;
            opacity: 0; pointer-events: none; filter: drop-shadow(0 0 12px cyan);
        }
        .active-slash { animation: slashAnime 0.22s ease-out forwards; }
        @keyframes slashAnime { 0% { opacity: 1; transform: rotate(-110deg) scale(0.4); } 100% { opacity: 0; transform: rotate(70deg) scale(1.4); } }

        /* PLATFORMS */
        .platform { position: absolute; background: linear-gradient(to bottom, #ff4d6d, #a30026); border-radius: 6px; box-shadow: 0 6px 0 #60001a; z-index: 20; }
        
        /* CONTROLS */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; z-index: 2000; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; backdrop-filter: blur(5px); }
        .atk-btn { background: #fff; color: #000; width: 85px; height: 85px; border: none; box-shadow: 0 0 20px cyan; }
        .jump-btn { width: 95px; height: 95px; background: #ff4d6d; border: none; font-weight: bold; font-size: 20px; box-shadow: 0 6px #a30026; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="world">
        <div id="player" class="char">
            <div id="haya-visual">
                <div class="cap"></div>
                <div class="arm arm-back"></div>
                <div class="leg leg-back"></div>
                <div class="coat"><div class="nurse-cross-side"></div></div>
                <div class="head">
                    <div class="hair-back"></div>
                    <div class="hair"></div>
                    <div class="eye"></div>
                </div>
                <div class="leg leg-front"></div>
                <div class="arm arm-front">
                    <div class="syringe"></div>
                </div>
                <div id="slash-arc"></div>
            </div>
        </div>
        <div id="platforms-layer"></div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:15px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
        <div style="display:flex; gap:15px; align-items: flex-end;">
            <div class="btn atk-btn" id="aBtn">💉</div>
            <div class="btn" id="dBtn" style="background:cyan; border:none; color:#000;">⚡</div>
            <div class="btn jump-btn" id="jBtn">JUMP</div>
        </div>
    </div>
</div>

<script>
    const world = document.getElementById('world'), player = document.getElementById('player');
    const visual = document.getElementById('haya-visual'), slash = document.getElementById('slash-arc');

    let pX = 150, pY = 400, vX = 0, vY = 0;
    let jumpCount = 0, dashReady = true, isDashing = false, isGrounded = false;
    const config = { gravity: 0.95, jump: -19, speed: 7.2, friction: 0.82, dashPower: 25 };

    const platforms = [
        {x: 0, y: 120, w: 850}, {x: 1000, y: 280, w: 450}, {x: 1550, y: 450, w: 400},
        {x: 2100, y: 300, w: 600}, {x: 2800, y: 450, w: 500}, {x: 3500, y: 250, w: 1200}
    ];

    platforms.forEach(p => {
        const d = document.createElement('div'); d.className = 'platform';
        Object.assign(d.style, {left:p.x+'px', bottom:p.y+'px', width:p.w+'px', height:'35px'});
        document.getElementById('platforms-layer').appendChild(d);
    });

    const setup = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };

    const keys = { l: false, r: false };
    setup('lBtn', () => keys.l = true, () => keys.l = false);
    setup('rBtn', () => keys.r = true, () => keys.r = false);
    
    setup('jBtn', () => { 
        if(jumpCount < 2) { 
            vY = config.jump; 
            jumpCount++; 
            visual.className = ""; void visual.offsetWidth; 
            visual.classList.add('jump-up'); 
        } 
    });

    setup('aBtn', () => {
        slash.classList.add('active-slash');
        setTimeout(() => slash.classList.remove('active-slash'), 220);
    });

    setup('dBtn', () => {
        if(dashReady) {
            isDashing = true; dashReady = false;
            let dir = player.style.transform.includes('-1') ? -1 : 1;
            vX = dir * config.dashPower;
            vY = 0;
            
            let t = setInterval(() => {
                const g = player.cloneNode(true); g.className = 'ghost'; g.id="";
                world.appendChild(g); setTimeout(() => g.remove(), 300);
            }, 50);

            setTimeout(() => { isDashing = false; clearInterval(t); }, 250);
            setTimeout(() => { dashReady = true; }, 800);
        }
    });

    function update() {
        if(!isDashing) {
            vX = keys.l ? -config.speed : (keys.r ? config.speed : vX * config.friction);
            vY += config.gravity;
        }
        pX += vX; pY -= vY;

        let onGround = false;
        platforms.forEach(p => {
            if (pX + 25 > p.x && pX < p.x + p.w) {
                if (vY > 0 && pY <= p.y + 35 && pY > p.y) {
                    if(!isGrounded) { 
                        visual.classList.add('land-down');
                        setTimeout(() => visual.classList.remove('land-down'), 200);
                    }
                    pY = p.y + 35; vY = 0; jumpCount = 0; onGround = true;
                }
            }
        });
        isGrounded = onGround;

        if(Math.abs(vX) > 1 && isGrounded) player.classList.add('walking');
        else player.classList.remove('walking');

        if(vX > 0.5) player.style.transform = "scaleX(1)";
        else if(vX < -0.5) player.style.transform = "scaleX(-1)";

        world.style.transform = `translateX(${-(pX - window.innerWidth/2)}px)`;
        player.style.left = pX + 'px'; player.style.bottom = pY + 'px';

        if(pY < -100) { pX = 150; pY = 400; vY = 0; }
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
