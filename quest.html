<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya: Phantom Strike ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: sans-serif; height: 100vh; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: radial-gradient(circle, #1a0033 0%, #05000a 100%); }
        #world { position: absolute; width: 5000px; height: 100%; will-change: transform; z-index: 10; }

        /* HUD */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .dash-outer { width: 140px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; border: 1px solid #00d4ff; }
        #dash-bar { width: 100%; height: 100%; background: cyan; box-shadow: 0 0 10px cyan; transition: width 0.1s; }

        /* --- CHARACTER DESIGN --- */
        .char { position: absolute; width: 60px; height: 90px; display: flex; align-items: flex-end; justify-content: center; z-index: 100; transform-origin: bottom center; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        #haya-visual { position: relative; width: 40px; height: 80px; transform-origin: bottom center; }
        
        /* Body Parts with better styling */
        .head { position: absolute; width: 28px; height: 28px; background: #ffdbac; border-radius: 50%; top: 0; left: 6px; z-index: 10; border: 1px solid #d4a373; transition: 0.2s; }
        .hair { position: absolute; width: 34px; height: 22px; background: #3d2b1f; border-radius: 15px 15px 5px 5px; top: -5px; left: -3px; }
        .torso { position: absolute; width: 32px; height: 38px; background: #fff; border-radius: 8px; top: 25px; left: 4px; z-index: 5; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .arm { position: absolute; width: 8px; height: 28px; background: #fff; border-radius: 4px; top: 28px; transform-origin: top center; z-index: 4; border-bottom: 4px solid #ffdbac; }
        .arm-l { left: -3px; } .arm-r { right: -3px; }
        .leg { position: absolute; width: 10px; height: 24px; background: #fff; border-radius: 0 0 4px 4px; top: 60px; transform-origin: top center; z-index: 4; border-bottom: 6px solid #111; }
        .leg-l { left: 6px; } .leg-r { left: 24px; }

        /* --- ADVANCED ANIMATIONS --- */
        .walking { transform: rotate(5deg); } /* Lean forward when walking */
        .walking .leg-l { animation: runCycle 0.3s infinite alternate; }
        .walking .leg-r { animation: runCycle 0.3s infinite alternate-reverse; }
        .walking .arm-l { animation: runCycle 0.3s infinite alternate-reverse; }
        .walking .arm-r { animation: runCycle 0.3s infinite alternate; }

        @keyframes runCycle { from { transform: rotate(-35deg); } to { transform: rotate(35deg); } }

        /* DASH EFFECT */
        .dashing-mode { filter: brightness(2) drop-shadow(0 0 10px cyan); transform: scale(1.4, 0.6) !important; }
        .ghost { position: absolute; opacity: 0.4; pointer-events: none; filter: blur(1px) sepia(1) saturate(5) hue-rotate(150deg); animation: fadeOut 0.4s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.8); } }

        /* SLASH */
        #slash-arc {
            position: absolute; width: 120px; height: 120px;
            border: 12px solid transparent; border-right-color: #00d4ff;
            border-radius: 50%; top: -10px; right: -70px;
            opacity: 0; pointer-events: none; filter: drop-shadow(0 0 5px cyan);
        }
        .active-slash { animation: slashAnime 0.2s ease-out forwards; }
        @keyframes slashAnime { 0% { opacity: 1; transform: rotate(-120deg) scale(0.5); } 100% { opacity: 0; transform: rotate(60deg) scale(1.4); } }

        /* JUMP & LAND */
        .jumping-style { transform: scale(0.8, 1.3); }
        .shockwave { position: absolute; width: 10px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 50%; animation: shock 0.3s ease-out forwards; }
        @keyframes shock { to { width: 100px; height: 20px; opacity: 0; } }

        /* WORLD */
        .platform { position: absolute; background: #ff4d6d; border-radius: 10px; box-shadow: 0 10px 0 #a30026; z-index: 20; }
        
        /* CONTROLS */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 2000; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; backdrop-filter: blur(10px); }
        .atk-btn { background: cyan; color: #000; width: 90px; height: 90px; border: none; box-shadow: 0 0 20px cyan; }
        .jump-btn { width: 100px; height: 100px; background: #ff4d6d; border: none; box-shadow: 0 8px #a30026; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="dash-outer"><div id="dash-bar"></div></div>
    </div>

    <div id="world">
        <div id="player" class="char">
            <div id="haya-visual">
                <div class="arm arm-l"></div>
                <div class="leg leg-l"></div>
                <div class="torso"></div>
                <div class="head">
                    <div class="hair"></div>
                    <div class="eye eye-l"></div>
                    <div class="eye eye-r"></div>
                </div>
                <div class="leg leg-r"></div>
                <div class="arm arm-r"></div>
                <div id="slash-arc"></div>
            </div>
        </div>
        <div id="platforms-layer"></div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:15px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
        <div style="display:flex; gap:15px; align-items: flex-end;">
            <div class="btn atk-btn" id="aBtn">💉</div>
            <div class="btn" id="dBtn" style="background:#00d4ff; border:none; font-size: 24px;">⚡</div>
            <div class="btn jump-btn" id="jBtn">JUMP</div>
        </div>
    </div>
</div>

<script>
    const world = document.getElementById('world'), player = document.getElementById('player');
    const visual = document.getElementById('haya-visual'), slash = document.getElementById('slash-arc');
    const dashBar = document.getElementById('dash-bar');

    let pX = 150, pY = 400, vX = 0, vY = 0;
    let isGrounded = false, dashReady = true, isDashing = false;
    const config = { gravity: 0.9, jump: -22, speed: 6.5, friction: 0.8, dashPower: 35 };

    const platforms = [
        {x: 0, y: 100, w: 800}, {x: 950, y: 250, w: 400}, {x: 1450, y: 400, w: 350},
        {x: 1900, y: 220, w: 600}, {x: 2600, y: 350, w: 2000}
    ];

    platforms.forEach(p => {
        const d = document.createElement('div'); d.className = 'platform';
        Object.assign(d.style, {left:p.x+'px', bottom:p.y+'px', width:p.w+'px', height:'40px'});
        document.getElementById('platforms-layer').appendChild(d);
    });

    const setup = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };

    const keys = { l: false, r: false };
    setup('lBtn', () => keys.l = true, () => keys.l = false);
    setup('rBtn', () => keys.r = true, () => keys.r = false);
    
    setup('jBtn', () => { 
        if(vY === 0) { vY = config.jump; player.classList.add('jumping-style'); } 
    });

    setup('aBtn', () => {
        slash.classList.add('active-slash');
        setTimeout(() => slash.classList.remove('active-slash'), 200);
    });

    setup('dBtn', () => {
        if(dashReady) {
            isDashing = true; dashReady = false;
            vX = (player.style.transform.includes('-1') ? -1 : 1) * config.dashPower;
            vY = 0; // Freeze gravity
            player.classList.add('dashing-mode');
            dashBar.style.width = "0%";
            
            // Create Ghost Trail
            let trailInterval = setInterval(() => {
                const ghost = player.cloneNode(true);
                ghost.classList.add('ghost');
                ghost.id = "";
                world.appendChild(ghost);
                setTimeout(() => ghost.remove(), 400);
            }, 40);

            setTimeout(() => { 
                isDashing = false; 
                player.classList.remove('dashing-mode');
                clearInterval(trailInterval);
            }, 300);
            setTimeout(() => { dashReady = true; dashBar.style.width = "100%"; }, 1200);
        }
    });

    function update() {
        if(!isDashing) {
            vX = keys.l ? -config.speed : (keys.r ? config.speed : vX * config.friction);
            vY += config.gravity;
        }
        
        pX += vX; pY -= vY;

        let onGroundNow = false;
        platforms.forEach(p => {
            if (pX + 35 > p.x && pX < p.x + p.w) {
                if (vY > 0 && pY <= p.y + 40 && pY > p.y) {
                    if(!isGrounded) createShockwave(pX, p.y + 40);
                    pY = p.y + 40; vY = 0; onGroundNow = true;
                    player.classList.remove('jumping-style');
                }
            }
        });
        isGrounded = onGroundNow;

        // Animate based on speed
        if(Math.abs(vX) > 1 && isGrounded) player.classList.add('walking');
        else player.classList.remove('walking');

        // Facing Direction
        if(vX > 0.1) player.style.transform = "scaleX(1)";
        else if(vX < -0.1) player.style.transform = "scaleX(-1)";

        // Cam
        world.style.transform = `translateX(${-(pX - window.innerWidth/2)}px)`;
        player.style.left = pX + 'px'; player.style.bottom = pY + 'px';

        if(pY < -100) { pX = 150; pY = 400; vY = 0; }
        requestAnimationFrame(update);
    }

    function createShockwave(x, y) {
        const s = document.createElement('div');
        s.className = 'shockwave';
        s.style.left = (x + 10) + 'px';
        s.style.bottom = y + 'px';
        world.appendChild(s);
        setTimeout(() => s.remove(), 300);
    }

    update();
</script>
</body>
</html>
