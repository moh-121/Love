<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haya: The Cutscene</title>
    <style>
        :root { --primary: #00f2ff; --accent: #ff0055; --bg: #05020a; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

        /* Cinematic Bars */
        .bar { position: fixed; width: 100%; height: 12vh; background: #000; z-index: 1000; transition: transform 1s ease; }
        .top-bar { top: 0; transform: translateY(-100%); }
        .bottom-bar { bottom: 0; transform: translateY(100%); }
        .active .top-bar, .active .bottom-bar { transform: translateY(0); }

        /* Scene Container */
        #scene { 
            position: relative; width: 100vw; height: 100vh; 
            background: linear-gradient(to bottom, #0a0515, #1a0b2e);
            display: flex; align-items: center; justify-content: center;
        }

        /* High-Detail Haya Portrait (Left Side) */
        #portrait-container {
            position: absolute; left: -100px; bottom: 0; width: 400px; height: 600px;
            opacity: 0; transition: all 1s ease-out; z-index: 500;
        }
        .active #portrait-container { left: 50px; opacity: 1; }

        /* Dialogue Box */
        #dialogue-ui {
            position: absolute; bottom: 15vh; left: 50%; transform: translateX(-50%);
            width: 70vw; background: rgba(10, 5, 20, 0.9);
            border: 2px solid var(--primary); padding: 30px; color: #fff;
            opacity: 0; z-index: 1100; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        .active #dialogue-ui { opacity: 1; transition-delay: 0.5s; }

        .char-name { color: var(--primary); font-weight: bold; font-size: 24px; margin-bottom: 10px; letter-spacing: 2px; }
        .text-content { font-size: 18px; line-height: 1.6; min-height: 60px; }

        /* Visual Effects */
        #glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 2000; opacity: 0.3;
        }

        /* Skip Button */
        #skip { position: fixed; top: 30px; right: 30px; color: #fff; border: 1px solid #fff; padding: 10px 20px; cursor: pointer; z-index: 3000; opacity: 0.5; }
    </style>
</head>
<body>

<div id="glitch-overlay"></div>
<div id="skip">SKIP [SPACE]</div>

<div id="scene">
    <div class="bar top-bar"></div>
    <div class="bar bottom-bar"></div>

    <div id="portrait-container">
        <svg width="400" height="600" viewBox="0 0 100 150">
            <rect x="30" y="40" width="40" height="80" rx="10" fill="white" /> <circle cx="50" cy="30" r="18" fill="#ffe0bd" /> <path d="M32 25 Q 50 10 68 25 L 68 35 Q 50 45 32 35 Z" fill="#3d2b1f" /> <rect x="42" y="10" width="16" height="8" rx="2" fill="white" stroke="#ddd" /> <rect x="58" y="28" width="4" height="6" rx="2" fill="#111" /> </svg>
    </div>

    <div id="dialogue-ui">
        <div class="char-name">HAYA // UNIT 01</div>
        <div class="text-content" id="typewriter"></div>
    </div>
</div>

<script>
    const script = [
        { name: "HAYA", text: "Neural link established... Heart rate stabilizing." },
        { name: "SYSTEM", text: "WARNING: Clinic Sector 7 has been breached. Biological threats detected." },
        { name: "HAYA", text: "Understood. Preparing the plasma infusion. It's time for their... check-up." }
    ];

    let currentStep = 0;
    const typewriter = document.getElementById('typewriter');
    const scene = document.getElementById('scene');

    function typeText(text) {
        typewriter.innerHTML = "";
        let i = 0;
        const interval = setInterval(() => {
            typewriter.innerHTML += text[i];
            i++;
            if (i >= text.length) clearInterval(interval);
        }, 30);
    }

    function nextStep() {
        if (currentStep < script.length) {
            const entry = script[currentStep];
            document.querySelector('.char-name').innerText = entry.name;
            typeText(entry.text);
            currentStep++;
        } else {
            // End of cutscene
            scene.classList.remove('active');
            typewriter.innerHTML = "SYSTEM LOADING...";
        }
    }

    // Initialize Cutscene
    setTimeout(() => {
        scene.classList.add('active');
        nextStep();
    }, 500);

    window.addEventListener('click', nextStep);
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') nextStep(); });
</script>
</body>
</html>
