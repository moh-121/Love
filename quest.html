<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya: Rescue Ops ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: sans-serif; height: 100vh; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #0a001a; }
        #world { position: absolute; width: 5000px; height: 100%; will-change: transform; z-index: 10; }

        /* HUD */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .heart-row { display: flex; gap: 8px; font-size: 26px; margin-bottom: 8px; }
        .dash-outer { width: 120px; height: 12px; background: rgba(0,0,0,0.3); border: 2px solid #fff; border-radius: 6px; overflow: hidden; }
        #dash-bar { width: 100%; height: 100%; background: #00d4ff; }

        /* --- CHARACTER DESIGN --- */
        .char { position: absolute; width: 60px; height: 90px; display: flex; align-items: flex-end; justify-content: center; z-index: 100; transform-origin: bottom center; }
        
        #haya-visual { position: relative; width: 40px; height: 80px; transform-origin: bottom center; transition: transform 0.1s; }
        
        /* Body Parts */
        .head { position: absolute; width: 28px; height: 28px; background: #ffdbac; border-radius: 50%; top: 0; left: 6px; z-index: 10; border: 1px solid #d4a373; }
        .hair { position: absolute; width: 34px; height: 18px; background: #3d2b1f; border-radius: 20px 20px 0 0; top: -4px; left: -3px; }
        .eye { position: absolute; width: 4px; height: 4px; background: #000; border-radius: 50%; top: 12px; }
        .eye-l { left: 7px; } .eye-r { left: 17px; }
        
        .torso { position: absolute; width: 34px; height: 40px; background: #fff; border-radius: 8px; top: 25px; left: 3px; z-index: 5; border: 1px solid #ddd; }
        .cross { color: #ff4d6d; font-size: 14px; position: absolute; top: 12px; left: 10px; font-weight: 900; }
        
        .arm { position: absolute; width: 9px; height: 30px; background: #fff; border-radius: 5px; top: 28px; transform-origin: top center; z-index: 4; border-bottom: 4px solid #ffdbac; }
        .arm-l { left: -4px; }
        .arm-r { right: -4px; }
        
        .leg { position: absolute; width: 11px; height: 25px; background: #fff; border-radius: 0 0 4px 4px; top: 60px; transform-origin: top center; z-index: 4; border-bottom: 8px solid #222; }
        .leg-l { left: 5px; }
        .leg-r { left: 24px; }

        /* ANIMATION STATES */
        .walking .leg-l { animation: legSwing 0.2s infinite alternate; }
        .walking .leg-r { animation: legSwing 0.2s infinite alternate-reverse; }
        .jumping .leg { transform: translateY(-5px) rotate(15deg); }
        .slashing .arm-r { animation: stab 0.2s ease-out; }

        @keyframes legSwing { from { transform: rotate(-30deg); } to { transform: rotate(30deg); } }
        @keyframes stab { 0% { transform: rotate(0); } 50% { transform: rotate(-100deg) scaleY(1.5); } 100% { transform: rotate(0); } }

        /* SWORD SLASH */
        #slash-arc {
            position: absolute; width: 100px; height: 100px;
            border: 10px solid transparent; border-right-color: #00d4ff;
            border-radius: 50%; top: 0; right: -60px;
            opacity: 0; pointer-events: none; z-index: 200;
        }
        .active-slash { animation: slashEffect 0.2s ease-out forwards; }
        @keyframes slashEffect { 0% { opacity: 1; transform: rotate(-90deg) scale(0.5); } 100% { opacity: 0; transform: rotate(90deg) scale(1.2); } }

        /* WORLD OBJECTS */
        .platform { position: absolute; background: #ff758c; border-top: 6px solid #ffafbd; border-bottom: 12px solid #a30026; border-radius: 10px; z-index: 20; }
        .enemy { position: absolute; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 30; background: #8e44ad; border-bottom: 4px solid #4a235a; }
        
        /* CONTROLS */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 2000; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; backdrop-filter: blur(10px); }
        .atk-btn { background: #fff; color: #333; width: 90px; height: 90px; border: none; font-size: 35px; }
        .jump-btn { width: 100px; height: 100px; background: #ff4d6d; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="heart-row" id="hearts">❤️ ❤️ ❤️</div>
        <div class="dash-outer"><div id="dash-bar"></div></div>
    </div>

    <div id="world">
        <div id="player" class="char">
            <div id="haya-visual">
                <div class="arm arm-l"></div>
                <div class="leg leg-l"></div>
                <div class="torso"><div class="cross">✚</div></div>
                <div class="head">
                    <div class="hair"></div>
                    <div class="eye eye-l"></div>
                    <div class="eye eye-r"></div>
                </div>
                <div class="leg leg-r"></div>
                <div class="arm arm-r"></div>
                <div id="slash-arc"></div>
            </div>
        </div>
        <div id="platforms-layer"></div>
        <div id="enemy-layer"></div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
        <div style="display:flex; gap:10px; align-items: flex-end;">
            <div class="btn atk-btn" id="aBtn">💉</div>
            <div class="btn" id="dBtn" style="background:#00d4ff; border:none;">⚡</div>
            <div class="btn jump-btn" id="jBtn">JUMP</div>
        </div>
    </div>
</div>

<script>
    const world = document.getElementById('world'), player = document.getElementById('player');
    const visual = document.getElementById('haya-visual'), slash = document.getElementById('slash-arc');
    const dashBar = document.getElementById('dash-bar');

    // Physics Tuning
    let pX = 150, pY = 400, vX = 0, vY = 0;
    let health = 3, jumps = 0, isGrounded = false, dashReady = true;
    const config = { gravity: 1.0, jump: -22, speed: 7.0, friction: 0.8, dashPower: 20 };

    const platforms = [
        {x: 0, y: 100, w: 800}, {x: 900, y: 250, w: 400}, {x: 1400, y: 400, w: 300},
        {x: 1800, y: 200, w: 600}, {x: 2500, y: 350, w: 400}
    ];

    platforms.forEach(p => {
        const d = document.createElement('div'); d.className = 'platform';
        Object.assign(d.style, {left:p.x+'px', bottom:p.y+'px', width:p.w+'px', height:'50px'});
        document.getElementById('platforms-layer').appendChild(d);
    });

    const keys = { left: false, right: false };
    const setup = (id, s, e) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
        if(e) el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
    };

    setup('lBtn', () => keys.left = true, () => keys.left = false);
    setup('rBtn', () => keys.right = true, () => keys.right = false);
    setup('jBtn', () => { if(jumps < 2) { vY = config.jump; jumps++; player.classList.add('jumping'); } });
    
    setup('dBtn', () => {
        if(dashReady) {
            vX = (player.style.transform.includes('-1') ? -1 : 1) * config.dashPower;
            dashReady = false; dashBar.style.width = "0%";
            setTimeout(() => { dashReady = true; dashBar.style.width = "100%"; }, 1000);
        }
    });

    setup('aBtn', () => {
        slash.classList.add('active-slash');
        player.classList.add('slashing');
        setTimeout(() => { slash.classList.remove('active-slash'); player.classList.remove('slashing'); }, 200);
    });

    function update() {
        vX = keys.left ? -config.speed : (keys.right ? config.speed : vX * config.friction);
        vY += config.gravity; pX += vX; pY -= vY;

        // Ground Check
        let grounded = false;
        platforms.forEach(p => {
            if (pX + 40 > p.x && pX < p.x + p.w) {
                if (vY > 0 && pY <= p.y + 50 && pY > p.y) {
                    pY = p.y + 50; vY = 0; jumps = 0; grounded = true;
                }
            }
        });
        isGrounded = grounded;

        // Animate
        if(Math.abs(vX) > 1 && isGrounded) player.classList.add('walking');
        else player.classList.remove('walking');
        if(isGrounded) player.classList.remove('jumping');

        // Facing Direction
        if(vX > 0.1) player.style.transform = "scaleX(1)";
        else if(vX < -0.1) player.style.transform = "scaleX(-1)";

        // Camera Follow
        let camTarget = -(pX - window.innerWidth/2);
        if(camTarget > 0) camTarget = 0;
        world.style.transform = `translateX(${camTarget}px)`;

        player.style.left = pX + 'px';
        player.style.bottom = pY + 'px';

        if(pY < -100) { pX = 150; pY = 400; vY = 0; } // Auto-respawn

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
