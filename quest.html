<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haya & Mohammed ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #05000a; font-family: -apple-system, sans-serif; height: 100vh; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 4000px; height: 100%; background: linear-gradient(to bottom, #0f001a 0%, #2b0000 100%); transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1); }

        /* CHARACTERS */
        .char { position: absolute; width: 45px; height: 60px; z-index: 50; display: flex; align-items: flex-end; justify-content: center; will-change: transform, left, top; }
        
        /* Haya Design */
        .haya-body { width: 38px; height: 48px; background: #fff; border-radius: 12px 12px 2px 2px; position: absolute; bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .stethoscope { position: absolute; width: 22px; height: 20px; border: 2.5px solid #333; border-radius: 50%; top: 4px; left: 8px; border-top-color: transparent; }
        .cross { color: #ff4d6d; font-size: 14px; position: absolute; top: 20px; left: 13px; font-weight: 900; }

        /* Mohammed Design */
        .mo-body { width: 40px; height: 52px; background: #1a1a1a; border-radius: 10px 10px 2px 2px; position: absolute; bottom: 8px; border-top: 18px solid #3d2b1f; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .mo-shirt { position: absolute; width: 12px; height: 20px; background: #34495e; top: 18px; left: 14px; border-radius: 2px; }
        .face { width: 100%; text-align: center; color: white; font-size: 11px; font-weight: bold; position: absolute; top: 18px; z-index: 2; }

        .foot { width: 14px; height: 10px; background: #111; border-radius: 3px; position: absolute; bottom: 0; }
        .foot-l { left: 6px; } .foot-r { right: 6px; }

        /* Cutscene Effects */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: background 3s; }
        .love-msg { font-family: 'Caveat', cursive; font-size: 45px; color: white; opacity: 0; transform: translateY(50px); transition: 2s all ease-out; text-shadow: 0 0 20px #ff4d6d; }
        .heart-particle { position: absolute; font-size: 30px; pointer-events: none; z-index: 1001; animation: heartBurst 2.5s forwards ease-out; }
        @keyframes heartBurst { 0% { transform: translate(0, 0) scale(0); opacity: 1; } 50% { opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; } }

        /* Elements */
        .platform { position: absolute; background: #ff758c; border-radius: 6px; border-bottom: 8px solid #a30026; z-index: 10; }
        #controls { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 200; transition: opacity 0.5s; }
        .btn { width: 85px; height: 85px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; border: 2px solid rgba(255,255,255,0.4); backdrop-filter: blur(10px); color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="world">
            <div id="player" class="char">
                <div class="haya-body"><div class="stethoscope"></div><div class="cross">✚</div></div>
                <div class="foot foot-l"></div><div class="foot foot-r"></div>
            </div>

            <div id="mohammed" class="char" style="left: 3650px; bottom: 150px;">
                <div class="mo-body"><div class="mo-shirt"></div><div class="face">^ _ ^</div></div>
                <div class="foot foot-l"></div><div class="foot foot-r"></div>
            </div>
            <div id="platforms-layer"></div>
        </div>

        <div id="controls">
            <div style="display:flex; gap:20px;"><div class="btn" id="lBtn">⬅️</div><div class="btn" id="rBtn">➡️</div></div>
            <div class="btn" id="jBtn" style="width:110px; border-radius:30px; background:#ff4d6d; font-size:20px; font-weight:bold;">JUMP</div>
        </div>
    </div>

    <div id="overlay"><div class="love-msg" id="msg">You Rescued My Heart ❤️</div></div>

    <script>
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const mo = document.getElementById('mohammed');
        const overlay = document.getElementById('overlay');
        const msg = document.getElementById('msg');
        
        let pX = 150, pY = 400, vX = 0, vY = 0, isGrounded = false, camX = 0, won = false;
        const config = { gravity: 0.9, jump: -22, speed: 9, charW: 45, charH: 60 };

        const level = [
            {x: 0, y: 100, w: 600, h: 40}, {x: 750, y: 220, w: 250, h: 20},
            {x: 1100, y: 350, w: 200, h: 20}, {x: 1400, y: 250, w: 300, h: 20},
            {x: 1800, y: 400, w: 200, h: 20}, {x: 2150, y: 280, w: 250, h: 20},
            {x: 2550, y: 450, w: 200, h: 20}, {x: 2900, y: 320, w: 250, h: 20},
            {x: 3350, y: 150, w: 650, h: 40}
        ];

        level.forEach(p => {
            const d = document.createElement('div');
            d.className = 'platform'; d.style.left = p.x + 'px'; d.style.bottom = p.y + 'px';
            d.style.width = p.w + 'px'; d.style.height = p.h + 'px';
            document.getElementById('platforms-layer').appendChild(d);
        });

        const setupBtn = (id, start, end) => {
            const b = document.getElementById(id);
            b.addEventListener('touchstart', (e) => { e.preventDefault(); if(!won) start(); });
            b.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };

        setupBtn('lBtn', () => { vX = -config.speed; player.style.transform = 'scaleX(-1)'; }, () => vX = 0);
        setupBtn('rBtn', () => { vX = config.speed; player.style.transform = 'scaleX(1)'; }, () => vX = 0);
        setupBtn('jBtn', () => { if(isGrounded) { vY = config.jump; isGrounded = false; } }, () => {});

        function startFinalScene() {
            won = true; vX = 0; vY = 0;
            document.getElementById('controls').style.opacity = '0';
            
            // 1. Camera Zoom and Lock
            const targetCamX = -(3650 - window.innerWidth / 2 + 25);
            world.style.transform = `translateX(${targetCamX}px) scale(1.6)`;
            
            // 2. Float and Move together
            setTimeout(() => {
                player.style.transition = "all 4s ease-in-out";
                mo.style.transition = "all 4s ease-in-out";
                
                // Float up
                const floatY = (window.innerHeight - 150 - 200); 
                player.style.top = (floatY) + "px";
                mo.style.top = (floatY) + "px";
                
                // Move together to the center of the viewport
                const centerPoint = 3650 - 30; 
                player.style.left = (centerPoint - 15) + "px";
                mo.style.left = (centerPoint + 15) + "px";

                overlay.style.background = "rgba(15, 0, 26, 0.6)";
            }, 500);

            // 3. Heart Explosion
            setTimeout(() => {
                for(let i=0; i<40; i++) setTimeout(createHeart, i * 40);
                msg.style.opacity = '1';
                msg.style.transform = 'translateY(0)';
            }, 3000);

            setTimeout(() => window.location.href = "index.html", 7500);
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart-particle';
            h.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
            h.style.left = '50%'; h.style.top = '40%';
            h.style.setProperty('--x', (Math.random() - 0.5) * 800 + 'px');
            h.style.setProperty('--y', (Math.random() - 0.5) * 800 + 'px');
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 2500);
        }

        function update() {
            if(!won) {
                pX += vX; vY += config.gravity; pY += vY;
                if(pX < 0) pX = 0; if(pX > 3950) pX = 3950;
                if(pY > window.innerHeight + 100) { pX = 150; pY = 400; vY = 0; }

                isGrounded = false;
                level.forEach(p => {
                    let pTop = window.innerHeight - p.y - p.h - config.charH;
                    if(vY >= 0 && pX + 30 > p.x && pX < p.x + p.w - 10) {
                        if(pY >= pTop - 15 && pY <= pTop + 15) { pY = pTop; vY = 0; isGrounded = true; }
                    }
                });

                camX = -(pX - window.innerWidth / 3);
                if(camX > 0) camX = 0;
                if(camX < -(4000 - window.innerWidth)) camX = -(4000 - window.innerWidth);
                world.style.transform = `translateX(${camX}px)`;

                player.style.left = pX + 'px';
                player.style.top = pY + 'px';

                if(Math.abs(pX - 3610) < 40 && isGrounded) startFinalScene();
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
